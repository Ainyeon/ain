<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>프로필 설정 | 에인연</title>
  <meta name="description" content="에인연 회원 프로필을 설정합니다.">
  <link rel="canonical" href="https://ainyeon.com/onboard/">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#F7F7F8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://oqgoibbhnidsveueifet.supabase.co">
  <link rel="preload" href="/assets/fonts/PretendardVariable.subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/assets/css/ain.css">
  <style>
    :root { color-scheme: light; --surface:#FFFFFF; --border:#E8E8EC; --txt:#0F1013; --txt2:#63676F; --txt3:#6E737C; }
    .wrap { width: min(100%, 560px); margin: 0 auto; padding: 0 24px 80px; }
    .page-head { padding: 108px 0 20px; }
    .ob-card {
      border: 1px solid rgba(255,255,255,.9); border-radius: 16px; background: var(--surface);
      padding: 22px 20px; box-shadow: var(--shadow-amb), 0 14px 34px -22px rgba(15,16,19,.14);
      display: grid; gap: 15px;
    }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12.5px; font-weight: 800; color: var(--txt2); }
    .field input, .field select {
      min-height: 48px; padding: 10px 13px; border: 1px solid var(--border); border-radius: 11px;
      background: #FBFBFC; font: inherit; font-size: 16px; color: var(--txt); width: 100%;
    }
    .field input:focus, .field select:focus { outline: 2px solid var(--g1); outline-offset: 1px; }
    .nick-status { font-size: 12px; font-weight: 700; min-height: 16px; }
    .nick-status.ok { color: #12766C; } .nick-status.bad { color: var(--up); }
    .ob-submit {
      min-height: 50px; border: none; border-radius: 12px; background: var(--ink); color: #fff;
      font: inherit; font-size: 15px; font-weight: 800; cursor: pointer;
    }
    .ob-submit[disabled] { opacity: .45; cursor: default; }
    .hint { font-size: 12px; color: var(--txt3); line-height: 1.6; }
    .gate-msg { padding: 28px 18px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); text-align: center; font-size: 14px; color: var(--txt2); }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="/auth.js"></script>
  <script defer src="/assets/js/ain-common.js"></script>
  <script defer src="/assets/js/ain-community.js"></script>
</head>
<body>
  <nav class="nav" id="nav">
    <a class="brand" href="/"><span class="brand-mark"></span>A.IN</a>
    <div class="nav-right">
      <a class="menu-pill" href="#" id="kakaoStart"><span class="plus">+</span>카카오로 시작</a>
    </div>
  </nav>
  <main class="wrap">
    <header class="page-head">
      <div class="sec-label">Welcome</div>
      <h1 class="page-title">프로필 설정</h1>
      <p class="page-sub">게시판·커뮤니티에서 쓸 프로필을 만들어 주세요. 30초면 됩니다.</p>
    </header>
    <div id="obBody"><div class="gate-msg">확인 중…</div></div>
  </main>
  <script>
    addEventListener('DOMContentLoaded', async () => {
      const next = new URLSearchParams(location.search).get('next') || '/';
      const body = document.getElementById('obBody');
      const { user, profile, infraError } = await ainCommunity.getMyProfile();

      if (infraError) {
        body.innerHTML = '<div class="gate-msg">커뮤니티 기능 준비 중입니다. 잠시 후 다시 시도해 주세요.</div>';
        return;
      }
      if (!user) {
        body.innerHTML = '<div class="gate-msg">카카오 로그인 후 프로필을 설정할 수 있습니다.<br><br>'
          + '<button type="button" class="ob-submit" id="obLogin" style="padding:0 24px;background:#FEE500;color:#191919">카카오 3초 로그인</button></div>';
        document.getElementById('obLogin').addEventListener('click', () => {
          ainAuth.getClient().auth.signInWithOAuth({
            provider: 'kakao',
            options: { redirectTo: location.origin + location.pathname + location.search }
          });
        });
        return;
      }

      const opts = Object.entries(ainCommunity.FIELD_LABELS)
        .filter(([id]) => !(ainCommunity.FIELD_LEGACY || []).includes(id))
        .map(([id, label]) => `<option value="${id}">${label}</option>`).join('');
      body.innerHTML = `
        <form class="ob-card" id="obForm">
          <div class="field">
            <label for="obNick">닉네임 (2~12자, 한글·영문·숫자)</label>
            <input type="text" id="obNick" maxlength="12" autocomplete="off" required>
            <span class="nick-status" id="nickStatus"></span>
          </div>
          <div class="field">
            <label for="obField">주력분야 (필수)</label>
            <select id="obField" required>
              <option value="" disabled selected>선택해 주세요</option>${opts}
            </select>
          </div>
          <div class="field">
            <label for="obRegion">활동지역 (선택)</label>
            <input type="text" id="obRegion" maxlength="20" placeholder="예: 인천·부천">
          </div>
          <button type="submit" class="ob-submit" id="obSubmit" disabled>시작하기</button>
          <p class="hint">표시는 "닉네임 · 분야뱃지"로 통일됩니다. 나중에 내정보에서 수정할 수 있습니다.</p>
        </form>`;

      const nickEl = document.getElementById('obNick');
      const fieldEl = document.getElementById('obField');
      const statusEl = document.getElementById('nickStatus');
      const submitEl = document.getElementById('obSubmit');
      if (profile) {
        nickEl.value = profile.nickname || '';
        if (profile.field) fieldEl.value = profile.field;
        document.getElementById('obRegion').value = profile.region || '';
      }

      const RE = /^[가-힣A-Za-z0-9]{2,12}$/;
      let nickOk = false, checkTimer = null;
      async function checkNick() {
        const v = nickEl.value.trim();
        nickOk = false;
        if (!v) { statusEl.textContent = ''; sync(); return; }
        if (!RE.test(v)) {
          statusEl.textContent = '한글·영문·숫자 2~12자만 가능합니다';
          statusEl.className = 'nick-status bad'; sync(); return;
        }
        if (profile && profile.nickname === v) {
          nickOk = true; statusEl.textContent = '현재 닉네임'; statusEl.className = 'nick-status ok'; sync(); return;
        }
        const { data, error } = await ainAuth.getClient().from('profiles')
          .select('id').eq('nickname', v).limit(1);
        if (error) { statusEl.textContent = '중복 확인 실패 — 저장 시 재확인됩니다'; statusEl.className = 'nick-status bad'; nickOk = true; }
        else if (data.length) { statusEl.textContent = '이미 사용 중인 닉네임입니다'; statusEl.className = 'nick-status bad'; }
        else { nickOk = true; statusEl.textContent = '사용 가능합니다'; statusEl.className = 'nick-status ok'; }
        sync();
      }
      function sync() { submitEl.disabled = !(nickOk && fieldEl.value); }
      nickEl.addEventListener('input', () => { clearTimeout(checkTimer); checkTimer = setTimeout(checkNick, 350); });
      fieldEl.addEventListener('change', sync);

      document.getElementById('obForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        submitEl.disabled = true; submitEl.textContent = '저장 중…';
        const row = {
          nickname: nickEl.value.trim(),
          field: fieldEl.value,
          region: document.getElementById('obRegion').value.trim() || null,
          updated_at: new Date().toISOString()
        };
        const db = ainAuth.getClient();
        let { error } = await db.from('profiles').update(row).eq('id', user.id);
        if (!error && !profile) {
          // 가입 트리거가 행을 못 만든 예외 케이스 자가복구
          const r2 = await db.from('profiles').insert({ id: user.id, ...row });
          error = r2.error;
        }
        if (error) {
          submitEl.disabled = false; submitEl.textContent = '시작하기';
          statusEl.className = 'nick-status bad';
          statusEl.textContent = error.code === '23505' ? '이미 사용 중인 닉네임입니다' : '저장 실패 — 다시 시도해 주세요';
          return;
        }
        location.href = next;
      });
    });
  </script>
</body>
</html>
