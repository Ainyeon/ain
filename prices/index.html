  <script>
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const kstToday = () => {
      const p2 = new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).formatToParts(new Date());
      const o = Object.fromEntries(p2.map((x) => [x.type, x.value]));
      return `${o.year}-${o.month}-${o.day}`;
    };
    // NEW 배지 — 전역 기준: KST 당일 수집 (결정론)
    const isNewToday = (v) => {
      if (!v) return false;
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return false;
      const p3 = new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).formatToParts(d);
      const o3 = Object.fromEntries(p3.map((x) => [x.type, x.value]));
      return `${o3.year}-${o3.month}-${o3.day}` === kstToday();  // timestamptz(UTC)도 KST 당일로 정확 판정
    };
    const newBadge = (v) => isNewToday(v) ? '<span class="new-badge">NEW</span>' : "";
    const tri = (dir) => dir === 0 ? "" :
      `<svg class="tri" viewBox="0 0 8 8" fill="currentColor" stroke="none" width="8" height="8"><path d="${dir > 0 ? "M4 1 7.5 7h-7Z" : "M4 7 .5 1h7Z"}"/></svg>`;

    const deltaCell = (pct, text) => {
      const n = Number(pct);
      const dir = Number.isFinite(n) ? Math.sign(n) : 0;
      const cls = dir > 0 ? "up" : dir < 0 ? "down" : "flat";
      return text ? `<span class="delta ${cls} num">${tri(dir)}${esc(text)}</span>` : '<span class="delta flat num">—</span>';
    };

    function metalRow(row) {
      const when = row.collected_at ? new Intl.DateTimeFormat("ko-KR", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", timeZone: "Asia/Seoul" }).format(new Date(row.collected_at)) : "-";
      const sp = row.source_payload || {};
      const weekPct = sp.change_week_percent;
      const weekTxt = Number.isFinite(Number(weekPct)) ? `${Number(weekPct) > 0 ? "+" : ""}${Number(weekPct).toFixed(2)}%` : "";
      return `<tr>
        <td data-th="품목" class="no-th"><div class="cell-title">${newBadge(row.collected_at)}${esc(row.name || row.item_id)}</div><div class="cell-sub">${esc(row.unit || "USD/mt")}</div></td>
        <td data-th="가격" class="ta-r nowrap num" style="font-weight:var(--fw-bold)">${esc(row.display_price || row.price)}</td>
        <td data-th="전일비" class="ta-r nowrap">${deltaCell(row.change_day_percent, row.display_change_day_percent)}</td>
        <td data-th="주간" class="ta-r nowrap">${deltaCell(weekPct, weekTxt)}</td>
        <td data-th="수집" class="nowrap num">${esc(when)}</td>
      </tr>`;
    }

    async function render() {
      const body = document.getElementById("priceBody");
      try {
        // HF3: 5종 확장 — prices 테이블 직쿼리(anon 공개), 최신 1행/종목 클라 dedupe
        const ORDER = ["copper", "aluminium", "nickel", "zinc", "usd_krw"];
        const { data, error } = await ainAuth.getClient().from("prices")
          .select("item_id,name,price,unit,display_price,change_day_percent,display_change_day_percent,source_payload,collected_at,status")
          .eq("status", "active").order("collected_at", { ascending: false }).limit(40);
        if (error) throw error;
        const seen = new Map();
        (data || []).forEach((r) => { if (ORDER.includes(r.item_id) && !seen.has(r.item_id)) seen.set(r.item_id, r); });
        const rows = ORDER.map((id) => seen.get(id)).filter(Boolean);
        if (!rows.length) {
          body.innerHTML = `<tr><td class="no-th" colspan="5"><div class="empty"><b>표시할 시세가 아직 없습니다</b>다음 수집에서 갱신됩니다</div></td></tr>`;
          return;
        }
        body.innerHTML = rows.map(metalRow).join("");
        const latest = rows[0].collected_at;
        if (latest) document.getElementById("updatedLabel").textContent =
          new Intl.DateTimeFormat("ko-KR", { month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).format(new Date(latest)) + " 기준";
      } catch (e) {
        body.innerHTML = `<tr><td class="no-th" colspan="5"><div class="empty"><b>시세를 불러오지 못했습니다</b>잠시 후 다시 확인해 주세요</div></td></tr>`;
        console.error(e);
      }
    }
    addEventListener("DOMContentLoaded", () => { ainAuth.init("authSlot"); render(); });
  </script>
