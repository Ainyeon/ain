<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>카드뉴스 작업대 | 에어컨 인테리어 연구소</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#F3F2EF">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preload" href="/assets/fonts/PretendardVariable.subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/assets/css/design-tokens.css?v=11">
  <link rel="stylesheet" href="/assets/css/components.css?v=11">
  <style>
    /* ── 카드뉴스 작업대 (어드민 전용) — 토큰 + 카드 원본 1080×1350 고정 ── */
    .cards-wrap{display:grid;gap:var(--sp-5);padding-bottom:var(--sp-8)}
    .card-item{display:grid;gap:var(--sp-3)}
    .card-stage{
      width:100%;max-width:420px;aspect-ratio:1080/1350;overflow:hidden;
      border:1px solid var(--c-line);border-radius:var(--r-2);box-shadow:var(--sh-1);
      position:relative;background:var(--c-surface);
    }
    .card-scale{position:absolute;top:0;left:0;transform-origin:top left}

    /* 카드 원본 (1080×1350) — 저장 시 이 노드를 그대로 추출 */
    .gov-card{
      width:1080px;height:1350px;background:#FFFFFF;
      display:flex;flex-direction:column;padding:72px 76px 64px;
      font-family:var(--font-sans);color:var(--c-ink);
    }
    .gc-top{display:flex;align-items:center;gap:16px}
    .gc-top .nb{padding:6px 16px;border-radius:10px;background:var(--c-accent);
      color:#fff;font-size:26px;font-weight:800;letter-spacing:.04em}
    .gc-top .cat{font-size:30px;font-weight:760;color:var(--c-ink-sub);letter-spacing:.02em}
    .gc-hook{
      margin-top:56px;font-size:76px;font-weight:850;line-height:1.28;
      letter-spacing:-0.03em;word-break:keep-all;
      display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
    }
    /* 브랜드 플레이스홀더 밴드 — 그라데이션 + 아이콘 + 워드마크 (og:image 실이미지는 P3b) */
    .gc-visual{
      margin-top:56px;height:300px;border-radius:24px;position:relative;overflow:hidden;
      background:linear-gradient(135deg,#2D4A9E,#9E2D3D); /* 리터럴 — html2canvas가 var()+다중배경 파싱 크래시(실측) */
      display:grid;place-items:center;
    }
    .gc-visual .gv-ic{width:130px;height:130px}
    .gc-visual .gv-wm{position:absolute;right:28px;bottom:20px;height:34px;width:auto}
    .gc-sum{margin-top:56px;display:grid;gap:22px}
    .gc-sum .ln{font-size:34px;line-height:1.5;color:var(--c-ink-sub);word-break:keep-all;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .gc-sum .ln b{color:var(--c-ink);font-weight:800}
    .gc-foot{margin-top:auto;border-top:3px solid var(--c-line);padding-top:44px;
      display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
    .gc-dead .dd{font-size:56px;font-weight:850;color:var(--c-up);letter-spacing:-0.02em}
    .gc-dead .dd.always{color:var(--c-ink-sub)}
    .gc-dead .dt{margin-top:10px;font-size:28px;color:var(--c-ink-faint)}
    .gc-cta{text-align:right}
    .gc-cta .site{font-size:34px;font-weight:850;color:var(--c-accent)}
    .gc-cta .ask{margin-top:10px;font-size:27px;color:var(--c-ink-sub)}

    .card-actions{display:flex;gap:var(--sp-2)}
    .card-actions .btn-line{cursor:pointer}
    .card-meta-line2{font-size:var(--fs-4);color:var(--c-ink-faint)}
    .hidden-done{display:none}
    .toolbar{display:flex;align-items:center;gap:var(--sp-3);margin-bottom:var(--sp-4)}
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script defer src="/auth.js"></script>
  <script defer src="/assets/js/ain-common.js"></script>
  <script defer src="/assets/js/ain-community.js"></script>
</head>
<body class="has-tabbar">
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-landmark" viewBox="0 0 24 24"><line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7"/></symbol>
    </defs>
  </svg>

  <nav class="tnav">
    <div class="tnav-in">
      <a class="brand" href="/"><svg class="brand-word" viewBox="0 0 929 307" role="img" aria-label="A.IN"><defs><linearGradient id="bgw" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2D4A9E"/><stop offset="1" stop-color="#9E2D3D"/></linearGradient></defs><g fill="url(#bgw)"><path d="M149 0L0 303L202 302L178 250L85 249L179 61L298 303L358 303L211 1Z"/><circle cx="427" cy="268" r="40"/><path d="M510 0L509 302L565 303L565 0Z"/><path d="M633 0L632 302L688 302L689 88L862 303L927 303L928 1L872 1L871 224L693 0Z"/></g></svg><span class="brand-name">에어컨 인테리어 연구소</span></a>
      <div class="tnav-auth" id="authSlot"></div>
    </div>
  </nav>

  <main class="shell">
    <header class="phero">
      <div class="phero-bar">
        <div>
          <div class="crumb">ADMIN · CARD NEWS</div>
          <h1>카드뉴스 작업대</h1>
          <p class="sub">정부사업 카드 1080×1350 — 저장해서 인스타·카페에 올리세요. 관리자 전용입니다.</p>
        </div>
      </div>
    </header>
    <div class="toolbar">
      <button type="button" class="btn-line" id="showDone">게시 완료 표시분 보기</button>
      <span class="card-meta-line2" id="cardStat">확인 중</span>
    </div>
    <section class="cards-wrap" id="panel" aria-live="polite">
      <div class="empty">권한 확인 중</div>
    </section>
  </main>

  <script>
    (function () {
      'use strict';
      const $ = (id) => document.getElementById(id);
      const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      const kstToday = () => {
        const p = new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).formatToParts(new Date());
        const o = Object.fromEntries(p.map((x) => [x.type, x.value]));
        return `${o.year}-${o.month}-${o.day}`;
      };
      // 게시 완료(숨김) = localStorage — 서버 무접촉 작업대 정리 (판단: 로컬 숨김 채택, 사유 핸드오프)
      const DONE_KEY = "ain_cards_done";
      const doneSet = () => new Set(JSON.parse(localStorage.getItem(DONE_KEY) || "[]"));
      const markDone = (k) => { const s = doneSet(); s.add(k); localStorage.setItem(DONE_KEY, JSON.stringify([...s])); };

      // 마감 표기 — 결정론 (P2 deadline_line과 동일 우선순위)
      const deadParts = (r) => {
        const n = r.application_end_date === null ? null : Number(r.d_day);
        if (n === null || !Number.isFinite(n)) return { dd: "상시 접수", cls: "always", dt: r.application_period_text || "" };
        const dd = n === 0 ? "오늘 마감" : `마감 D-${n}`;
        return { dd, cls: "", dt: r.application_period_text || `${r.application_start_date || ""} ~ ${r.application_end_date}` };
      };

      function cardHtml(r, idx) {
        const hook = r.hook || r.program_name;                    // hook NULL → 사업명 폴백
        const isNew = String(r.first_seen_date || "").slice(0, 10) === kstToday(); // first_seen_date는 date형(비-UTC) — slice 안전
        const sum = (r.summary || "").split("\n").filter(Boolean);
        const d = deadParts(r);
        const sumHtml = sum.map((ln) => {
          const i = ln.indexOf(":");
          return `<div class="ln"><b>${esc(ln.slice(0, i + 1))}</b>${esc(ln.slice(i + 1))}</div>`;
        }).join("");
        return `
        <div class="card-item" data-key="${esc(r.source_url)}">
          <div class="card-stage"><div class="card-scale">
            <div class="gov-card" id="card${idx}">
              <div class="gc-top">${isNew ? '<span class="nb">NEW</span>' : ""}<span class="cat">정부지원사업</span></div>
              <div class="gc-hook">${esc(hook)}</div>
              <div class="gc-visual"><img class="gv-ic" alt="" width="130" height="130" src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22130%22%20height%3D%22130%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23FFFFFF%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20opacity%3D%220.95%22%3E%3Cline%20x1%3D%223%22%20x2%3D%2221%22%20y1%3D%2222%22%20y2%3D%2222%22/%3E%3Cline%20x1%3D%226%22%20x2%3D%226%22%20y1%3D%2218%22%20y2%3D%2211%22/%3E%3Cline%20x1%3D%2210%22%20x2%3D%2210%22%20y1%3D%2218%22%20y2%3D%2211%22/%3E%3Cline%20x1%3D%2214%22%20x2%3D%2214%22%20y1%3D%2218%22%20y2%3D%2211%22/%3E%3Cline%20x1%3D%2218%22%20x2%3D%2218%22%20y1%3D%2218%22%20y2%3D%2211%22/%3E%3Cpolygon%20points%3D%2212%202%2020%207%204%207%22/%3E%3C/svg%3E"><img class="gv-wm" alt="" width="103" height="34" src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22103%22%20height%3D%2234%22%20viewBox%3D%220%200%20929%20307%22%20opacity%3D%220.9%22%3E%3Cg%20fill%3D%22%23FFFFFF%22%3E%3Cpath%20d%3D%22M149%200L0%20303L202%20302L178%20250L85%20249L179%2061L298%20303L358%20303L211%201Z%22/%3E%3Ccircle%20cx%3D%22427%22%20cy%3D%22268%22%20r%3D%2240%22/%3E%3Cpath%20d%3D%22M510%200L509%20302L565%20303L565%200Z%22/%3E%3Cpath%20d%3D%22M633%200L632%20302L688%20302L689%2088L862%20303L927%20303L928%201L872%201L871%20224L693%200Z%22/%3E%3C/g%3E%3C/svg%3E"></div>
              <div class="gc-sum">${sumHtml}</div>
              <div class="gc-foot">
                <div class="gc-dead"><div class="dd ${d.cls}">${esc(d.dd)}</div><div class="dt">${esc(d.dt)}</div></div>
                <div class="gc-cta"><div class="site">ainyeon.com/gov</div><div class="ask">자세한 정보는 댓글 남겨주세요</div></div>
              </div>
            </div>
          </div></div>
          <div class="card-meta-line2">${esc(r.program_name)}</div>
          <div class="card-actions">
            <button type="button" class="btn-line" data-save="${idx}">이미지 저장 (1080×1350)</button>
            <button type="button" class="btn-line" data-done="${idx}">게시 완료 (숨김)</button>
          </div>
        </div>`;
      }

      function fitScales() {
        document.querySelectorAll(".card-stage").forEach((stage) => {
          const scale = stage.clientWidth / 1080;
          stage.querySelector(".card-scale").style.transform = `scale(${scale})`;
        });
      }

      async function saveCard(idx) {
        const el = document.getElementById(`card${idx}`);
        await document.fonts.ready;
        const canvas = await html2canvas(el, { width: 1080, height: 1350, scale: 1, backgroundColor: "#FFFFFF", useCORS: true });
        const a = document.createElement("a");
        a.download = `ainyeon-gov-card-${kstToday()}-${idx + 1}.png`;
        a.href = canvas.toDataURL("image/png");
        a.click();
      }

      async function render(showDone) {
        const panel = $("panel");
        const sb = ainAuth.getClient();
        const { data, error } = await sb.from("v_gov_list")
          .select("program_name,summary,hook,first_seen_date,d_day,application_start_date,application_end_date,application_period_text,source_url")
          .order("application_end_date", { ascending: true, nullsFirst: false })
          .limit(50);
        if (error) { panel.innerHTML = `<div class="empty"><b>목록을 불러올 수 없습니다</b>${esc(error.message)}</div>`; return; }
        const done = doneSet();
        const rows = (data || []).filter((r) => showDone || !done.has(r.source_url));
        $("cardStat").textContent = `카드 ${rows.length}건 · 게시완료 표시 ${done.size}건`;
        if (!rows.length) { panel.innerHTML = `<div class="empty"><b>표시할 카드가 없습니다</b></div>`; return; }
        panel.innerHTML = rows.map(cardHtml).join("");
        fitScales();
        panel.querySelectorAll("[data-save]").forEach((b) => b.addEventListener("click", () => saveCard(Number(b.dataset.save))));
        panel.querySelectorAll("[data-done]").forEach((b) => b.addEventListener("click", () => {
          const item = b.closest(".card-item");
          markDone(item.dataset.key);
          item.classList.add("hidden-done");
          $("cardStat").textContent = `게시완료 표시 ${doneSet().size}건`;
        }));
      }

      addEventListener("resize", fitScales);
      addEventListener("DOMContentLoaded", async () => {
        ainAuth.init("authSlot");
        const me = await ainCommunity.getMyProfile();
        const role = me && me.profile && me.profile.role;
        if (!me || !me.user) { $("panel").innerHTML = '<div class="empty"><b>로그인이 필요합니다</b></div>'; return; }
        if (!["admin", "manager"].includes(role)) { $("panel").innerHTML = '<div class="empty"><b>관리자 전용 페이지입니다</b></div>'; return; }
        let showDone = false;
        $("showDone").addEventListener("click", () => { showDone = !showDone; $("showDone").textContent = showDone ? "게시 완료 숨기기" : "게시 완료 표시분 보기"; render(showDone); });
        render(showDone);
      });
    })();
  </script>
</body>
</html>
