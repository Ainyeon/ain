<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>카드뉴스 작업대 | 에어컨 인테리어 연구소</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#F3F2EF">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preload" href="/assets/fonts/PretendardVariable.subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/assets/css/design-tokens.css?v=11">
  <link rel="stylesheet" href="/assets/css/components.css?v=12">
  <style>
    /* ── 카드뉴스 작업대 (어드민 전용) — 토큰 + 카드 원본 1080×1350 고정 ── */
    .cards-wrap{display:grid;gap:var(--sp-5);padding-bottom:var(--sp-8)}
    .card-item{display:grid;gap:var(--sp-3)}
    .card-stage{
      width:100%;max-width:420px;aspect-ratio:1080/1350;overflow:hidden;
      border:1px solid var(--c-line);border-radius:var(--r-2);box-shadow:var(--sh-1);
      position:relative;background:var(--c-surface);
    }
    .card-scale{position:absolute;top:0;left:0;transform-origin:top left}

    /* 카드 원본 (1080×1350) — 저장 시 이 노드를 그대로 추출 */
    .gov-card{
      width:1080px;height:1350px;background:#FFFFFF;
      display:flex;flex-direction:column;padding:72px 76px 64px;
      font-family:var(--font-sans);color:var(--c-ink);
    }
    .gc-top{display:flex;align-items:center;gap:16px}
    .gc-top .nb{padding:6px 16px;border-radius:10px;background:var(--c-accent);
      color:#fff;font-size:26px;font-weight:800;letter-spacing:.04em}
    .gc-top .cat{font-size:30px;font-weight:760;color:var(--c-ink-sub);letter-spacing:.02em}
    /* flex:none 필수 — .gov-card가 height 1350 고정 flex 컬럼이라, 총 내용이 넘치면
       flex-shrink 기본값(1)이 훅을 눌러 3번째 줄 하단을 잘라먹는다(실데이터 11/17건 실측:
       자연높이 292px인데 박스가 253~278px로 눌림). 훅은 눌리지 않게 고정하고,
       넘치는 만큼은 fitHook()이 폰트를 줄여 흡수한다 — 내용 손실 0. */
    .gc-hook{
      margin-top:56px;font-size:76px;font-weight:850;line-height:1.28;
      letter-spacing:-0.03em;word-break:keep-all;flex:none;
      display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
    }
    /* 브랜드 플레이스홀더 밴드 — 그라데이션 + 아이콘 + 워드마크 (og:image 실이미지는 P3b)
       flex:none — 없으면 훅 대신 이 밴드가 눌려 카드마다 높이가 달라진다(실측 11/17건 300→260).
       캐러셀에선 장마다 밴드 높이가 튀므로 고정이 필수. 넘침은 fitHook()이 폰트로 흡수한다. */
    .gc-visual{
      margin-top:56px;height:300px;flex:none;border-radius:24px;position:relative;overflow:hidden;
      background:linear-gradient(135deg,#2D4A9E,#9E2D3D); /* 리터럴 — html2canvas가 var()+다중배경 파싱 크래시(실측) */
      display:grid;place-items:center;
    }
    .gc-visual .gv-ic{width:130px;height:130px}
    .gc-visual .gv-wm{position:absolute;right:28px;bottom:20px;height:34px;width:auto}
    .gc-sum{margin-top:56px;display:grid;gap:22px}
    .gc-sum .ln{font-size:34px;line-height:1.5;color:var(--c-ink-sub);word-break:keep-all;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .gc-sum .ln b{color:var(--c-ink);font-weight:800}
    .gc-foot{margin-top:auto;border-top:3px solid var(--c-line);padding-top:44px;
      display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
    .gc-dead .dd{font-size:56px;font-weight:850;color:var(--c-up);letter-spacing:-0.02em}
    .gc-dead .dd.always{color:var(--c-ink-sub)}
    .gc-dead .dt{margin-top:10px;font-size:28px;color:var(--c-ink-faint)}
    .gc-cta{text-align:right}
    .gc-cta .site{font-size:34px;font-weight:850;color:var(--c-accent)}
    .gc-cta .ask{margin-top:10px;font-size:27px;color:var(--c-ink-sub)}

    .card-actions{display:flex;gap:var(--sp-2)}
    .card-actions .btn-line{cursor:pointer}
    .card-meta-line2{font-size:var(--fs-4);color:var(--c-ink-faint)}
    .hidden-done{display:none}
    .toolbar{display:flex;align-items:center;gap:var(--sp-3);margin-bottom:var(--sp-4)}
    /* B(정보) 카드 — A 레이아웃 그대로, 자유문 요약만 4줄 클램프 */
    .gc-sum .ln.ln-b{-webkit-line-clamp:4}
    .sec-title{font-size:var(--fs-2);font-weight:800;margin:var(--sp-6) 0 var(--sp-3)}
    .sec-title small{font-weight:600;color:var(--c-ink-faint);margin-left:8px}

    /* ══ 4장 캐러셀 (정부지원사업 1건 → 훅 / 정보 / 자격+마감 / 리드마그넷) ══
       그라데이션 = 브랜드 토큰 --brand-gradient(135deg,#2D4A9E,#9E2D3D)와 동일한
       각도·정지점을 리터럴로 박는다.
       · 리터럴 이유: html2canvas가 var()+다중배경에서 파싱 크래시(.gc-visual과 동일 사유, 실측)
       · 4장 전부 같은 각도·정지점 → 캐러셀에서 톤이 튀지 않는다
       · scrim 불필요 판정(실측): 흰 글자 대비가 정지점 전 구간 7.25:1 이상(최악=코퍼단)이라
         WCAG AA(4.5)·AAA(7) 모두 통과. 브랜드 '코퍼'가 밝은 구리가 아니라 딥 마룬이라서다.
         ⚠️ 정지점을 더 밝은 색으로 바꾸면 이 전제가 깨진다 — scrim 재검토 + 픽셀 재실측할 것. */
    .cc{
      width:1080px;height:1350px;position:relative;overflow:hidden;
      display:flex;flex-direction:column;padding:72px 76px 64px;
      background:linear-gradient(135deg,#2D4A9E,#9E2D3D);
      color:#FFFFFF;font-family:var(--font-sans);
    }
    .cc-top{display:flex;align-items:center;gap:16px;flex:none}
    /* 배지·CTA = 흰 배경 + 코퍼(브랜드 계열 최암부) 텍스트 — 흰 위 7.25:1 */
    .cc-badge{padding:8px 20px;border-radius:10px;background:#FFFFFF;color:#9E2D3D;
      font-size:26px;font-weight:800;letter-spacing:.04em}
    .cc-cat{font-size:30px;font-weight:760;color:#FFFFFF;opacity:.82;letter-spacing:.02em}
    /* flex:none + fitHook — .gc-hook과 동일한 눌림·클램프 잘림 방지 */
    .cc-hook{
      margin-top:56px;font-size:76px;font-weight:850;line-height:1.28;
      letter-spacing:-0.03em;word-break:keep-all;flex:none;
      display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
    }
    .cc-lead{margin-top:auto;font-size:34px;font-weight:800;opacity:.92;flex:none}
    /* margin-top:auto — 푸터를 카드 바닥에 고정한다. 없으면 내용이 짧은 2·3·4장에서
       푸터가 카드 중간에 떠버린다(실측). 1장은 .cc-lead가 이미 auto로 바닥을 잡으므로
       인접 규칙으로 되돌린다 — auto가 둘이면 남는 공간을 나눠 가져 리드가 가운데로 뜬다. */
    .cc-foot{margin-top:auto;padding-top:32px;border-top:2px solid rgba(255,255,255,.28);
      display:flex;align-items:center;justify-content:space-between;gap:24px;flex:none}
    .cc-lead + .cc-foot{margin-top:40px}
    .cc-foot .site{font-size:30px;font-weight:850;color:#FFFFFF}
    .cc-foot .wm{height:32px;width:auto;opacity:.9}
    .cc-h2{margin-top:48px;font-size:46px;font-weight:850;letter-spacing:-0.02em;flex:none}
    .cc-blocks{margin-top:40px;display:grid;gap:34px;flex:none}
    .cc-bk .k{font-size:28px;font-weight:800;opacity:.72;letter-spacing:.02em}
    .cc-bk .v{margin-top:12px;font-size:36px;line-height:1.45;font-weight:600;word-break:keep-all;
      display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
    .cc-dday{margin-top:40px;align-self:flex-start;padding:14px 28px;border-radius:12px;
      background:#FFFFFF;color:#9E2D3D;font-size:44px;font-weight:850;letter-spacing:-0.02em;flex:none}
    .cc-lm{margin-top:56px;display:grid;gap:32px;flex:none}
    .cc-lm .l1{font-size:58px;font-weight:850;line-height:1.32;letter-spacing:-0.03em;word-break:keep-all}
    .cc-lm .l2{font-size:36px;line-height:1.45;font-weight:600;opacity:.92;word-break:keep-all}
    .cc-lm .cta{margin-top:6px;justify-self:start;padding:18px 32px;border-radius:14px;
      background:#FFFFFF;color:#9E2D3D;font-size:38px;font-weight:850}
    /* 작업대 배치 — 한 세트(4장) 가로 나열 */
    .set-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-2)}
    .set-cap{font-size:var(--fs-5,12px);font-weight:700;color:var(--c-ink-faint);margin-bottom:4px}
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <main class="shell">
    <header class="phero">
      <div class="phero-bar">
        <div>
          <div class="crumb">ADMIN · CARD NEWS</div>
          <h1>카드뉴스 작업대</h1>
          <p class="sub">A(정부·강훅) / B(제조사 뉴스·정보) 카드 1080×1350 — 저장해서 인스타·카페에 올리세요. 관리자 전용입니다.</p>

      <button type="button" class="btn-line" id="showDone">게시 완료 표시분 보기</button>

    </div>
    <h2 class="sec-title" id="secA" hidden>A — 정부지원사업<small>4장 캐러셀 · 훅 / 정보 / 자격+마감 / 리드마그넷</small></h2>
    <section class="cards-wrap" id="panel" aria-live="polite">
      <div class="empty">권한 확인 중</div>
    </section>
    <h2 class="sec-title" id="secB" hidden>B — 제조사 뉴스<small>삼성·LG 뉴스룸 · 정보</small></h2>
    <section class="cards-wrap" id="panelB" aria-live="polite" hidden></section>

  <script>
    (function () {
      'use strict';
      const $ = (id) => document.getElementById(id);
      const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      const kstDateOf = (d) => {
        const p = new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).formatToParts(d);
        const o = Object.fromEntries(p.map((x) => [x.type, x.value]));
        return `${o.year}-${o.month}-${o.day}`;
      };
      const kstToday = () => kstDateOf(new Date());
      // 게시 완료(숨김) = localStorage — 서버 무접촉 작업대 정리 (판단: 로컬 숨김 채택, 사유 핸드오프)
      const DONE_KEY = "ain_cards_done";
      const doneSet = () => new Set(JSON.parse(localStorage.getItem(DONE_KEY) || "[]"));
      const markDone = (k) => { const s = doneSet(); s.add(k); localStorage.setItem(DONE_KEY, JSON.stringify([...s])); };

      // 마감 표기 — 결정론 (P2 deadline_line과 동일 우선순위)
      const deadParts = (r) => {
        const n = r.application_end_date === null ? null : Number(r.d_day);
        if (n === null || !Number.isFinite(n)) return { dd: "상시 접수", cls: "always", dt: r.application_period_text || "" };
        const dd = n === 0 ? "오늘 마감" : `마감 D-${n}`;
        return { dd, cls: "", dt: r.application_period_text || `${r.application_start_date || ""} ~ ${r.application_end_date}` };
      };

      // 브랜드 플레이스홀더 밴드 — A/B 공통 (기사 og:image 추출은 수집기 개편 필요 — P3b 범위 밖, 배선만)
      const VISUAL_BAND = `<div class="gc-visual"><img class="gv-ic" alt="" width="130" height="130" src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22130%22%20height%3D%22130%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23FFFFFF%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20opacity%3D%220.95%22%3E%3Cline%20x1%3D%223%22%20x2%3D%2221%22%20y1%3D%2222%22%20y2%3D%2222%22/%3E%3Cline%20x1%3D%226%22%20x2%3D%226%22%20y1%3D%2218%22%20y2%3D%2211%22/%3E%3Cline%20x1%3D%2210%22%20x2%3D%2210%22%20y1%3D%2218%22%20y2%3D%2211%22/%3E%3Cline%20x1%3D%2214%22%20x2%3D%2214%22%20y1%3D%2218%22%20y2%3D%2211%22/%3E%3Cline%20x1%3D%2218%22%20x2%3D%2218%22%20y1%3D%2218%22%20y2%3D%2211%22/%3E%3Cpolygon%20points%3D%2212%202%2020%207%204%207%22/%3E%3C/svg%3E"><img class="gv-wm" alt="" width="103" height="34" src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22103%22%20height%3D%2234%22%20viewBox%3D%220%200%20929%20307%22%20opacity%3D%220.9%22%3E%3Cg%20fill%3D%22%23FFFFFF%22%3E%3Cpath%20d%3D%22M149%200L0%20303L202%20302L178%20250L85%20249L179%2061L298%20303L358%20303L211%201Z%22/%3E%3Ccircle%20cx%3D%22427%22%20cy%3D%22268%22%20r%3D%2240%22/%3E%3Cpath%20d%3D%22M510%200L509%20302L565%20303L565%200Z%22/%3E%3Cpath%20d%3D%22M633%200L632%20302L688%20302L689%2088L862%20303L927%20303L928%201L872%201L871%20224L693%200Z%22/%3E%3C/g%3E%3C/svg%3E"></div>`;

      // 흰 워드마크 (카드 푸터 공통) — VISUAL_BAND의 gv-wm와 동일 자산
      const WORDMARK = `<img class="wm" alt="A.IN" width="97" height="32" src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2297%22%20height%3D%2232%22%20viewBox%3D%220%200%20929%20307%22%3E%3Cg%20fill%3D%22%23FFFFFF%22%3E%3Cpath%20d%3D%22M149%200L0%20303L202%20302L178%20250L85%20249L179%2061L298%20303L358%20303L211%201Z%22/%3E%3Ccircle%20cx%3D%22427%22%20cy%3D%22268%22%20r%3D%2240%22/%3E%3Cpath%20d%3D%22M510%200L509%20302L565%20303L565%200Z%22/%3E%3Cpath%20d%3D%22M633%200L632%20302L688%20302L689%2088L862%20303L927%20303L928%201L872%201L871%20224L693%200Z%22/%3E%3C/g%3E%3C/svg%3E">`;
      const CC_FOOT = `<div class="cc-foot"><div class="site">ainyeon.com</div>${WORDMARK}</div>`;

      // summary(P2)는 "지원대상: / 지원내용: / 신청기한:" 3블록 고정 포맷 — 그 축을 그대로 쓴다.
      // ⚠️ 금액은 원문 문자열 그대로만 노출한다("최대 1,500만원"). 숫자 생성·계산 금지(§2 추정값 금지):
      //    구조화된 금액 컬럼이 없고, 금액 2개 이상인 행이 3/17(17.6%)뿐이라 '규모' 카드는 세우지 않았다.
      const SUM_KEYS = ["지원대상", "지원내용", "신청기한"];
      function sumBlocks(summary) {
        const out = {};
        String(summary || "").split("\n").filter(Boolean).forEach((ln) => {
          const i = ln.indexOf(":");
          if (i < 0) return;
          const k = ln.slice(0, i).trim();
          if (SUM_KEYS.includes(k)) out[k] = ln.slice(i + 1).trim();
        });
        return out;
      }

      // 4장 세트 — 1건 → 훅 / 정보 / 자격+마감 / 리드마그넷
      // ⚠️ region(지역)은 어느 장에도 찍지 않는다: v_gov_list의 region='전국' 14건 중 11건(78.6%)이
      //    실제로는 지역사업이라 표기하면 오정보가 된다(수집기 region 정합화 = 별건 P0).
      //    카드4가 묻는 '지역'은 사용자가 남기는 값이라 이 오염과 무관하다.
      function cardSetHtml(r, idx) {
        const hook = r.hook || r.program_name;                    // hook NULL → 사업명 폴백
        const isNew = String(r.first_seen_date || "").slice(0, 10) === kstToday(); // date형 — slice 안전
        const b = sumBlocks(r.summary);
        const d = deadParts(r);
        const target = b["지원대상"] || r.support_target || "";
        const period = b["신청기한"] || d.dt || "";
        const badge = isNew ? '<span class="cc-badge">NEW</span>' : "";
        const hasDday = d.cls !== "always";                       // d_day 없으면 D-n 생략(11/17만 존재)

        // 1 훅 — 지역·자격 언급 없음. 어그로는 hook 카피라이터가 담당(숫자금지·≤44자·금칙어)
        const c1 = `<div class="cc" id="set${idx}-1">
            <div class="cc-top">${badge}<span class="cc-cat">정부지원사업</span></div>
            <div class="cc-hook">${esc(hook)}</div>
            <div class="cc-lead">자격은 다음 장 →</div>
            ${CC_FOOT}
          </div>`;

        // 2 정보 — summary 3블록 원문 그대로 (금액도 원문 문자열)
        const blocks = SUM_KEYS.filter((k) => b[k]).map((k) =>
          `<div class="cc-bk"><div class="k">${esc(k)}</div><div class="v">${esc(b[k])}</div></div>`
        ).join("");
        const c2 = `<div class="cc" id="set${idx}-2">
            <div class="cc-top"><span class="cc-cat">정부지원사업</span></div>
            <div class="cc-h2">지원 내용</div>
            <div class="cc-blocks">${blocks || `<div class="cc-bk"><div class="v">${esc(r.program_name)}</div></div>`}</div>
            ${CC_FOOT}
          </div>`;

        // 3 자격+마감 — 여기서 거른다. 지역 표기 없음(위 주석 참조)
        const c3 = `<div class="cc" id="set${idx}-3">
            <div class="cc-top"><span class="cc-cat">신청 자격</span></div>
            <div class="cc-h2">이런 분이면 신청하세요</div>
            <div class="cc-blocks">
              ${target ? `<div class="cc-bk"><div class="k">지원대상</div><div class="v">${esc(target)}</div></div>` : ""}
              ${period ? `<div class="cc-bk"><div class="k">신청기한</div><div class="v">${esc(period)}</div></div>` : ""}
            </div>
            ${hasDday ? `<div class="cc-dday">${esc(d.dd)}</div>` : ""}
            ${CC_FOOT}
          </div>`;

        // 4 리드마그넷 — 고정 엔딩(데이터 무관 브랜드 상수)
        const c4 = `<div class="cc" id="set${idx}-4">
            <div class="cc-top"><span class="cc-cat">에인연</span></div>
            <div class="cc-lm">
              <div class="l1">우리 지역 지원사업 궁금하면<br>댓글에 지역 남겨주세요</div>
              <div class="l2">매일 업데이트되는 지원사업 페이지 보내드립니다</div>
              <div class="l2">에어컨·인테리어 업계 정부지원·시세·구인구직, 에인연이 매일 정리합니다</div>
              <div class="cta">놓치기 싫으면 → 에인연 가입</div>
            </div>
            ${CC_FOOT}
          </div>`;

        const stage = (html, cap) => `<div><div class="set-cap">${cap}</div>
          <div class="card-stage"><div class="card-scale">${html}</div></div></div>`;
        return `
        <div class="card-item" data-key="${esc(r.source_url)}">
          <div class="set-grid">
            ${stage(c1, "1 훅")}${stage(c2, "2 정보")}${stage(c3, "3 자격+마감")}${stage(c4, "4 리드마그넷")}
          </div>
          <div class="card-meta-line2">${esc(r.program_name)}</div>
          <div class="card-actions">
            <button type="button" class="btn-line" data-saveset="${idx}">4장 저장 (1080×1350)</button>
            <button type="button" class="btn-line" data-done="${idx}">게시 완료 (숨김)</button>
          </div>
        </div>`;
      }

      // B(정보) 카드 — 제조사 뉴스룸. A 레이아웃 재사용, 데이터 매핑만 다름
      const MAKER_LABEL = { samsung: "삼성전자", lg: "LG전자" };
      // LG 원문 요약의 "Quick Point ■" 불릿 잔재 제거 (실측: 카드에 그대로 노출됨)
      const cleanSummary = (s) => String(s || "").replace(/Quick Point/gi, " ").replace(/[■●▶]+/g, " ").replace(/\s+/g, " ").trim();
      function cardHtmlB(r, idx) {
        const isNew = kstDateOf(new Date(r.collected_at)) === kstToday(); // collected_at은 timestamptz — KST 변환 후 비교
        const pd = String(r.source_published_date || "").slice(0, 10);    // date형 — slice 안전
        const dd = pd ? `${Number(pd.slice(5, 7))}/${Number(pd.slice(8, 10))} 발행` : "발행일 확인 필요";
        return `
        <div class="card-item" data-key="${esc(r.url)}">
          <div class="card-stage"><div class="card-scale">
            <div class="gov-card" id="cardb${idx}">
              <div class="gc-top">${isNew ? '<span class="nb">NEW</span>' : ""}<span class="cat">제조사 뉴스 · ${esc(MAKER_LABEL[r.manufacturer] || r.manufacturer)}</span></div>
              <div class="gc-hook">${esc(r.title)}</div>
              ${VISUAL_BAND}
              <div class="gc-sum"><div class="ln ln-b">${esc(cleanSummary(r.summary))}</div></div>
              <div class="gc-foot">
                <div class="gc-dead"><div class="dd always">${esc(dd)}</div><div class="dt">${esc(r.source || "")}</div></div>
                <div class="gc-cta"><div class="site">ainyeon.com</div><div class="ask">자세한 정보는 댓글 남겨주세요</div></div>
              </div>
            </div>
          </div></div>
          <div class="card-meta-line2">${esc(r.source || "")} · ${esc(r.title)}</div>
          <div class="card-actions">
            <button type="button" class="btn-line" data-save="${idx}">이미지 저장 (1080×1350)</button>
            <button type="button" class="btn-line" data-done="${idx}">게시 완료 (숨김)</button>
          </div>
        </div>`;
      }

      // 훅 오토핏 — 훅·밴드가 flex:none이라 넘침은 여기서만 해소된다.
      // 두 조건을 동시에 만족할 때까지 폰트를 줄인다:
      //  ① 실제 래핑 줄 수 ≤ 3 — clamp:3이 4번째 줄을 소리없이 잘라먹는 걸 막는다.
      //     ⚠️ 'card.scrollHeight ≤ 1350'만으로는 못 잡는다. clamp가 박스를 3줄로 가둬서
      //        4줄짜리 훅도 카드는 멀쩡히 들어맞기 때문(실측 6/17건이 이렇게 잘려나감).
      //  ② 카드 총 높이 ≤ 1350 — 내보내기 원본 크기.
      const HOOK_MAX_PX = 76, HOOK_MIN_PX = 46, CARD_H = 1350, HOOK_MAX_LINES = 3;

      // 클램프를 잠시 풀어 '잘리지 않았다면 몇 줄인지'를 잰다
      function naturalLines(hook) {
        const prev = hook.style.webkitLineClamp;
        hook.style.webkitLineClamp = "unset";
        const lineH = parseFloat(getComputedStyle(hook).lineHeight);
        const lines = Math.round(hook.scrollHeight / lineH);
        hook.style.webkitLineClamp = prev || "";
        return lines;
      }

      function fitHook(card) {
        const hook = card.querySelector(".gc-hook, .cc-hook");
        if (!hook) return;
        // 허용 줄 수는 각 훅의 clamp 값을 그대로 따른다 (A카드 3줄 / 4장세트 훅카드 4줄 —
        // 훅 카드는 요약·밴드가 없어 세로 여유가 있다). 상수 하드코딩하면 둘 중 하나가 틀어진다.
        const maxLines = parseInt(getComputedStyle(hook).webkitLineClamp, 10) || HOOK_MAX_LINES;
        let size = HOOK_MAX_PX;
        hook.style.fontSize = `${size}px`;
        while (size > HOOK_MIN_PX && (naturalLines(hook) > maxLines || card.scrollHeight > CARD_H)) {
          size -= 2;
          hook.style.fontSize = `${size}px`;
        }
      }

      function fitAllHooks(panel) {
        panel.querySelectorAll(".gov-card, .cc").forEach(fitHook);
      }

      function fitScales() {
        document.querySelectorAll(".card-stage").forEach((stage) => {
          const scale = stage.clientWidth / 1080;
          stage.querySelector(".card-scale").style.transform = `scale(${scale})`;
        });
      }

      async function saveCard(domId, fname) {
        const el = document.getElementById(domId);
        await document.fonts.ready;
        const canvas = await html2canvas(el, { width: 1080, height: 1350, scale: 1, backgroundColor: "#FFFFFF", useCORS: true });
        const a = document.createElement("a");
        a.download = `ainyeon-${fname}.png`;
        a.href = canvas.toDataURL("image/png");
        a.click();
      }

      // 저장·게시완료 버튼 배선 — A/B 공통 (idPrefix: card|cardb, fnPrefix: 파일명)
      function bindCards(panel, idPrefix, fnPrefix, statFn) {
        panel.querySelectorAll("[data-save]").forEach((b) => b.addEventListener("click", () => {
          const i = Number(b.dataset.save);
          saveCard(`${idPrefix}${i}`, `${fnPrefix}-${kstToday()}-${i + 1}`);
        }));
        // 4장 세트 — 캐러셀 순서(1~4)를 파일명에 박아 업로드 시 순서가 섞이지 않게 한다
        panel.querySelectorAll("[data-saveset]").forEach((b) => b.addEventListener("click", async () => {
          const i = Number(b.dataset.saveset);
          b.disabled = true;
          const prev = b.textContent;
          for (let n = 1; n <= 4; n++) {
            b.textContent = `저장 중 ${n}/4`;
            await saveCard(`set${i}-${n}`, `gov-set-${kstToday()}-${i + 1}-${n}`);
          }
          b.textContent = prev;
          b.disabled = false;
        }));
        panel.querySelectorAll("[data-done]").forEach((b) => b.addEventListener("click", () => {
          const item = b.closest(".card-item");
          markDone(item.dataset.key);
          item.classList.add("hidden-done");
          statFn();
        }));
      }

      let statA = 0, statB = 0;
      const updateStat = () => { $("cardStat").textContent = `A ${statA}건 · B ${statB}건 · 게시완료 표시 ${doneSet().size}건`; };

      async function render(showDone) {
        const panel = $("panel");
        const sb = ainAuth.getClient();
        const { data, error } = await sb.from("v_gov_list")
          .select("program_name,summary,hook,first_seen_date,d_day,application_start_date,application_end_date,application_period_text,source_url")
          .order("application_end_date", { ascending: true, nullsFirst: false })
          .limit(50);
        if (error) { panel.innerHTML = `<div class="empty"><b>목록을 불러올 수 없습니다</b>${esc(error.message)}</div>`; return; }
        const done = doneSet();
        const rows = (data || []).filter((r) => showDone || !done.has(r.source_url));
        statA = rows.length; updateStat();
        if (!rows.length) { panel.innerHTML = `<div class="empty"><b>표시할 A 카드가 없습니다</b></div>`; return; }
        panel.innerHTML = rows.map(cardSetHtml).join("");
        await document.fonts.ready; // 폰트 로드 전 측정하면 줄 수가 달라져 오토핏이 빗나간다
        fitAllHooks(panel);
        fitScales();
        bindCards(panel, "card", "gov-card", updateStat);
      }

      // B 렌더 — 삼성·LG 뉴스룸 배선 (manufacturer_news_items, anon RLS: active만 공개 읽기).
      // 정예 = 제목에 공조 키워드가 있는 건만 (payload.title_matched_keywords 非빈 — 수집기 다운스트림 필터 규약)
      async function renderB(showDone) {
        const panel = $("panelB");
        const sb = ainAuth.getClient();
        const { data, error } = await sb.from("manufacturer_news_items")
          .select("manufacturer,title,summary,source,url,source_published_date,collected_at")
          .eq("status", "active")
          .neq("source_payload->title_matched_keywords", "[]")
          .order("source_published_date", { ascending: false })
          .limit(8);
        if (error) { panel.innerHTML = `<div class="empty"><b>제조사 뉴스를 불러올 수 없습니다</b>${esc(error.message)}</div>`; return; }
        const done = doneSet();
        const rows = (data || []).filter((r) => showDone || !done.has(r.url));
        statB = rows.length; updateStat();
        if (!rows.length) { panel.innerHTML = `<div class="empty"><b>표시할 B 카드가 없습니다</b></div>`; return; }
        panel.innerHTML = rows.map(cardHtmlB).join("");
        await document.fonts.ready;
        fitAllHooks(panel);
        fitScales();
        bindCards(panel, "cardb", "maker-news", updateStat);
      }

      addEventListener("resize", fitScales);
      addEventListener("DOMContentLoaded", async () => {
        ainAuth.init("authSlot");
        const me = await ainCommunity.getMyProfile();
        const role = me && me.profile && me.profile.role;
        if (!me || !me.user) { $("panel").innerHTML = '<div class="empty"><b>로그인이 필요합니다</b></div>'; return; }
        if (!["admin", "manager"].includes(role)) { $("panel").innerHTML = '<div class="empty"><b>관리자 전용 페이지입니다</b></div>'; return; }
        $("secA").hidden = false; $("secB").hidden = false; $("panelB").hidden = false;
        let showDone = false;
        $("showDone").addEventListener("click", () => { showDone = !showDone; $("showDone").textContent = showDone ? "게시 완료 숨기기" : "게시 완료 표시분 보기"; render(showDone); renderB(showDone); });
        render(showDone);
        renderB(showDone);
      });
    })();
  </script>
</body>
</html>
