<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>모닝브리핑 | 에인연</title>
  <meta name="description" content="자재시세, 입주정보, 업계뉴스를 한 장으로 보는 에인연 모닝브리핑입니다.">
  <meta property="og:title" content="모닝브리핑 | 에인연">
  <meta property="og:description" content="매일 아침 에어컨·인테리어 업계에 필요한 정보를 한 장으로 정리합니다.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0E1116">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0E1116;
      --surface: #1A1F28;
      --surface2: #161B23;
      --border: #2A313D;
      --txt: #E8EBF0;
      --txt2: #9BA3B0;
      --txt3: #6B7280;
      --g-start: #2D4A9E;
      --g-end: #9E2D3D;
      --blue: #3D5BB0;
      --purple: #7A4A8C;
      --burgundy: #B0454F;
      --danger: #E08A92;
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      letter-spacing: 0;
    }
    a { color: inherit; text-decoration: none; }
    .wrap { width: min(100%, 520px); margin: 0 auto; padding: 0 0 56px; }
    header { padding: 34px 24px 22px; border-bottom: 1px solid var(--border); }
    .head-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }
    .logo-block { min-width: 0; }
    .logo-svg { height: 46px; width: auto; display: block; }
    .sub { margin-top: 8px; color: var(--txt2); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
    .updated { padding-top: 6px; color: var(--txt2); font-size: 12px; font-weight: 700; text-align: right; white-space: nowrap; }
    h1 { margin: 22px 0 0; color: var(--txt); font-size: 24px; font-weight: 800; line-height: 1.22; letter-spacing: 0; }
    .meta { margin-top: 6px; color: var(--txt2); font-size: 13px; line-height: 1.55; }
    .summary { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-top: 18px; }
    .summary-item { min-height: 68px; padding: 11px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); }
    .summary-value { display: block; color: #fff; font-size: 21px; font-weight: 800; line-height: 1.1; }
    .summary-label { display: block; margin-top: 7px; color: var(--txt2); font-size: 11px; line-height: 1.25; }
    .panel { padding: 24px; display: grid; gap: 14px; }
    .brief-section {
      border: 1px solid var(--border);
      border-left: 3px solid var(--blue);
      border-radius: 8px;
      background: var(--surface);
      padding: 16px 17px;
      overflow: hidden;
    }
    .brief-section.news { border-left-color: var(--purple); }
    .brief-section.todo { border-left-color: var(--burgundy); }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 11px; }
    .section-title { color: var(--txt); font-size: 16px; font-weight: 800; line-height: 1.3; }
    .section-count { flex-shrink: 0; border: 1px solid rgba(61, 91, 176, .34); border-radius: 999px; background: rgba(61, 91, 176, .18); color: #9CB4F5; padding: 3px 9px; font-size: 11px; font-weight: 800; line-height: 1.2; }
    .item-list { display: grid; gap: 9px; }
    .line-item { padding: 10px 0 0; border-top: 1px solid var(--border); color: var(--txt2); font-size: 13px; line-height: 1.52; word-break: keep-all; overflow-wrap: break-word; }
    .line-item:first-child { padding-top: 0; border-top: 0; }
    .line-item b { color: var(--txt); font-weight: 800; }
    .line-item small { display: block; margin-top: 3px; color: var(--txt3); font-size: 11px; }
    .line-link { display: block; margin-top: 4px; color: #8FA9E8; font-size: 12px; font-weight: 800; }
    .loading, .empty, .error { padding: 32px 18px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--txt2); text-align: center; font-size: 13px; }
    .error { color: var(--danger); }
    .cta { margin: 0 24px; padding: 18px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); }
    .cta-title { color: var(--txt); font-size: 15px; font-weight: 800; }
    .cta-sub { margin-top: 4px; color: var(--txt2); font-size: 12px; }
    .cta-links { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
    .cta-button { min-height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: linear-gradient(135deg, var(--g-start), var(--g-end)); color: #fff; font-size: 13px; font-weight: 800; }
    footer { padding: 22px 24px 0; color: var(--txt3); font-size: 11px; line-height: 1.6; }
    @media (min-width: 760px) {
      .wrap { width: min(100%, 760px); }
      header { padding-top: 40px; }
      h1 { font-size: 30px; }
      .panel { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .brief-section:first-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="head-row">
        <div class="logo-block">
          <svg class="logo-svg" viewBox="0 0 929 307" xmlns="http://www.w3.org/2000/svg" aria-label="A.IN">
            <defs><linearGradient id="ain-logo-gradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2D4A9E"/><stop offset="100%" stop-color="#9E2D3D"/></linearGradient></defs>
            <g fill="url(#ain-logo-gradient)"><path d="M149 0L0 303L202 302L178 250L85 249L179 61L298 303L358 303L211 1Z"/><circle cx="427" cy="268" r="40"/><path d="M510 0L509 302L565 303L565 0Z"/><path d="M633 0L632 302L688 302L689 88L862 303L927 303L928 1L872 1L871 224L693 0Z"/></g>
          </svg>
          <div class="sub">에어컨 인테리어 연구소</div>
        </div>
        <div class="updated" id="updatedLabel">업데이트 확인 중</div>
      </div>
      <h1>모닝브리핑</h1>
      <div class="meta">자재시세, 입주정보, 업계뉴스를 오늘 기준으로 묶어 봅니다.</div>
      <div class="summary" aria-label="모닝브리핑 요약">
        <div class="summary-item"><span class="summary-value" id="priceStatus">-</span><span class="summary-label">시세</span></div>
        <div class="summary-item"><span class="summary-value" id="moveInCount">-</span><span class="summary-label">입주 단지</span></div>
        <div class="summary-item"><span class="summary-value" id="newsCount">-</span><span class="summary-label">뉴스</span></div>
      </div>
    </header>
    <section class="panel" id="briefingPanel" aria-live="polite">
      <div id="status" class="loading">모닝브리핑을 불러오는 중</div>
    </section>
    <section class="cta" aria-label="에인연 더 보기">
      <div class="cta-title">에인연 허브</div>
      <div class="cta-sub">입주 캘린더와 업계뉴스도 같이 확인하세요.</div>
      <div class="cta-links">
        <a class="cta-button" href="../calendar/">입주캘린더</a>
        <a class="cta-button" href="../news/">업계뉴스</a>
      </div>
    </section>
    <footer>자동발행 없이 검수용으로 구성됩니다. 가격과 입주 정보는 원천 데이터 지연에 따라 달라질 수 있습니다.</footer>
  </main>
  <script>
    const SUPABASE_URL = "https://oqgoibbhnidsveueifet.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_SpAwevRkW29BHRuJeFdfSA_Ube6Z4Vo";
    const PRICE_URL = "https://raw.githubusercontent.com/Ainyeon/ain-automation/main/data/prices.json";
    const CALENDAR_VIEW = "public_move_in_calendar";
    const panelEl = document.getElementById("briefingPanel");
    const statusEl = document.getElementById("status");
    const updatedLabelEl = document.getElementById("updatedLabel");
    const priceStatusEl = document.getElementById("priceStatus");
    const moveInCountEl = document.getElementById("moveInCount");
    const newsCountEl = document.getElementById("newsCount");

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function todayLabel() {
      return new Intl.DateTimeFormat("ko-KR", { month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).format(new Date()).replace(/\.$/, "");
    }

    function formatDate(value) {
      if (!value) return "";
      const day = new Date(value);
      if (Number.isNaN(day.getTime())) return String(value).slice(0, 10);
      return new Intl.DateTimeFormat("ko-KR", { month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).format(day).replace(/\.$/, "");
    }

    function section(title, count, items, className = "") {
      const article = document.createElement("article");
      article.className = `brief-section ${className}`.trim();
      article.innerHTML = `
        <div class="section-head">
          <div class="section-title">${title}</div>
          <div class="section-count">${count}</div>
        </div>
        <div class="item-list">${items.join("")}</div>
      `;
      return article;
    }

    function line(main, sub = "", link = "") {
      return `<div class="line-item">${main}${sub ? `<small>${sub}</small>` : ""}${link ? `<a class="line-link" href="${link}" target="_blank" rel="noopener">원문 보기</a>` : ""}</div>`;
    }

    async function fetchPrices() {
      const response = await fetch(PRICE_URL, { cache: "no-store" });
      if (!response.ok) throw new Error(`prices.json ${response.status}`);
      return response.json();
    }

    function priceItems(payload) {
      if (!payload || payload.status !== "ok") {
        const reason = payload && payload.error ? ` (${escapeHtml(payload.error)})` : "";
        return [line(`<b>자재시세 확인 필요</b>${reason}`), line("<b>냉매</b>: 준비중")];
      }
      const items = Array.isArray(payload.items) ? payload.items : [];
      const rows = items.filter((item) => ["copper", "aluminium"].includes(item.id)).map((item) => {
        const change = item.display_change_day ? `전일 ${escapeHtml(item.display_change_day)}${item.display_change_day_percent ? ` / ${escapeHtml(item.display_change_day_percent)}` : ""}` : "전일 변동 확인 중";
        return line(`<b>${escapeHtml(item.name || item.id)}</b>: ${escapeHtml(item.display_price || item.price)}`, change);
      });
      rows.push(line("<b>냉매</b>: 준비중"));
      return rows.length ? rows : [line("<b>자재시세 확인 필요</b>"), line("<b>냉매</b>: 준비중")];
    }

    async function fetchCalendar() {
      const query = new URLSearchParams({
        select: "content_text,stage,calendar_date",
        stage: "like.calendar_metro_%",
        order: "calendar_date.desc",
        limit: "1"
      });
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${CALENDAR_VIEW}?${query}`, {
        headers: { apikey: SUPABASE_PUBLISHABLE_KEY, Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}` }
      });
      if (!response.ok) throw new Error(`calendar ${response.status}`);
      const rows = await response.json();
      return rows[0] || null;
    }

    function parseMoveIns(text) {
      const items = [];
      text.split("\n").forEach((raw) => {
        const lineText = raw.trim();
        if (!lineText.startsWith("·") || items.length >= 5) return;
        const clean = lineText.replace(/^·\s*/, "");
        const parts = clean.split(" — ");
        if (parts.length < 2) return;
        const region = parts[0];
        const name = parts.slice(1).join(" — ").replace(/\s*\(([^)]+)\)\s*$/, "");
        const monthMatch = clean.match(/\(([^)]+)\)\s*$/);
        items.push({ region, name, month: monthMatch ? monthMatch[1] : "" });
      });
      return items;
    }

    async function fetchNews() {
      const query = new URLSearchParams({
        select: "title,source,url,collected_at",
        status: "eq.active",
        order: "collected_at.desc",
        limit: "5"
      });
      const response = await fetch(`${SUPABASE_URL}/rest/v1/news_items?${query}`, {
        headers: { apikey: SUPABASE_PUBLISHABLE_KEY, Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}` }
      });
      if (!response.ok) throw new Error(`news ${response.status}`);
      return response.json();
    }

    async function render() {
      statusEl.remove();
      updatedLabelEl.textContent = `${todayLabel()} 기준`;
      const [prices, calendar, news] = await Promise.allSettled([fetchPrices(), fetchCalendar(), fetchNews()]);
      const priceRows = prices.status === "fulfilled" ? priceItems(prices.value) : [line(`<b>자재시세 확인 필요</b> (${escapeHtml(prices.reason.message)})`), line("<b>냉매</b>: 준비중")];
      const calendarRow = calendar.status === "fulfilled" ? calendar.value : null;
      const moveIns = calendarRow ? parseMoveIns(calendarRow.content_text || "") : [];
      const newsRows = news.status === "fulfilled" ? news.value : [];
      panelEl.append(section("📊 자재시세", prices.status === "fulfilled" && prices.value.status === "ok" ? "정상" : "확인 필요", priceRows));
      panelEl.append(section("🏠 입주정보", `${moveIns.length}건`, moveIns.length ? moveIns.map((item) => line(`<b>${escapeHtml(item.name)}</b>`, `${escapeHtml(item.region)}${item.month ? ` · ${escapeHtml(item.month)}` : ""}`)) : [line("<b>입주정보 확인 필요</b>")]));
      panelEl.append(section("📰 업계뉴스", `${newsRows.length}건`, newsRows.length ? newsRows.map((item) => line(`<b>${escapeHtml(item.title)}</b>`, `${escapeHtml(item.source)} · ${formatDate(item.collected_at)}`, item.url)) : [line("<b>업계뉴스 확인 필요</b>")], "news"));
      panelEl.append(section("💼 구인구직", "준비중", [line("<b>준비중</b>")], "todo"));
      panelEl.append(section("🏛 정부사업", "준비중", [line("<b>준비중</b>")], "todo"));
      priceStatusEl.textContent = prices.status === "fulfilled" && prices.value.status === "ok" ? "OK" : "확인";
      moveInCountEl.textContent = moveIns.length.toLocaleString("ko-KR");
      newsCountEl.textContent = newsRows.length.toLocaleString("ko-KR");
    }

    render().catch((error) => {
      statusEl.className = "error";
      statusEl.textContent = "모닝브리핑을 불러오지 못했습니다. 잠시 후 다시 확인해 주세요.";
      console.error(error);
    });
  </script>
</body>
</html>
