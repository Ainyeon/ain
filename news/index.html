  <script>
    const OVERSEAS_NEWS_SOURCES = new Set(["Cooling Post", "Contractor Magazine"]);
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    const kstToday = () => {
      const p2 = new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).formatToParts(new Date());
      const o = Object.fromEntries(p2.map((x) => [x.type, x.value]));
      return `${o.year}-${o.month}-${o.day}`;
    };
    // NEW 배지 — 전역 기준: KST 당일 수집 (결정론)
    const isNewToday = (v) => {
      if (!v) return false;
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return false;
      const p3 = new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).formatToParts(d);
      const o3 = Object.fromEntries(p3.map((x) => [x.type, x.value]));
      return `${o3.year}-${o3.month}-${o3.day}` === kstToday();  // timestamptz(UTC)도 KST 당일로 정확 판정
    };
    const newBadge = (v) => isNewToday(v) ? '<span class="new-badge">NEW</span>' : "";
    function formatDateTime(value) {
      if (!value) return "-";
      const day = new Date(value);
      if (Number.isNaN(day.getTime())) return value;
      return new Intl.DateTimeFormat("ko-KR", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", timeZone: "Asia/Seoul" }).format(day);
    }
    function compactDate(value) {
      if (!value) return "-";
      const day = new Date(value);
      if (Number.isNaN(day.getTime())) return String(value).slice(5, 10).replace("-", ".");
      return new Intl.DateTimeFormat("ko-KR", { month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).format(day).replace(/\.$/, "");
    }

    function newsRow(row) {
      const summary = row.summary ? `<div class="news-summary">${esc(row.summary)}</div>` : "";
      return `<a class="row" href="${esc(row.url)}" target="_blank" rel="noopener">
        <div class="row-main">
          <div class="row-title">${newBadge(row.collected_at)}${esc(row.title || "제목 확인 필요")}</div>
          ${summary}
          <div class="row-meta">${esc(row.source || "출처")} · ${formatDateTime(row.collected_at)}</div>
        </div>
        <div class="row-side"><span class="btn-src">원문<svg class="icon sm"><use href="#i-ext"/></svg></span></div>
      </a>`;
    }

    async function render() {
      const domEl = document.getElementById("domRows");
      const ovsEl = document.getElementById("ovsRows");
      try {
        const { data, error } = await ainAuth.getClient()
          .from("news_items")
          .select("title,summary,source,url,collected_at")
          .eq("status", "active")
          .order("collected_at", { ascending: false })
          .limit(30);
        if (error) throw error;
        const rows = data || [];
        if (!rows.length) {
          domEl.innerHTML = ovsEl.innerHTML = `<div class="empty"><b>표시할 업계뉴스가 아직 없습니다</b>다음 수집에서 갱신됩니다</div>`;
          return;
        }
        const domestic = rows.filter((r) => !OVERSEAS_NEWS_SOURCES.has(r.source));
        const overseas = rows.filter((r) => OVERSEAS_NEWS_SOURCES.has(r.source));
        domEl.innerHTML = domestic.length ? domestic.map(newsRow).join("") : `<div class="empty">국내 뉴스가 없습니다</div>`;
        ovsEl.innerHTML = overseas.length ? overseas.map(newsRow).join("") : `<div class="empty">해외 뉴스가 없습니다</div>`;
        document.getElementById("domCnt").textContent = `${domestic.length}건`;
        document.getElementById("ovsCnt").textContent = `${overseas.length}건`;
        document.getElementById("newsCount").textContent = rows.length.toLocaleString("ko-KR");
        document.getElementById("sourceCount").textContent = new Set(rows.map((r) => r.source).filter(Boolean)).size.toLocaleString("ko-KR");
        document.getElementById("latestDate").textContent = compactDate(rows[0].collected_at);
        document.getElementById("updatedLabel").textContent = `${formatDateTime(rows[0].collected_at)} 업데이트`;
      } catch (e) {
        domEl.innerHTML = ovsEl.innerHTML = `<div class="empty"><b>뉴스를 불러오지 못했습니다</b>잠시 후 다시 확인해 주세요</div>`;
        console.error(e);
      }
    }
    addEventListener("DOMContentLoaded", () => { ainAuth.init("authSlot"); render(); });
  </script>
