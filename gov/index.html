  <script>
    // ── 데이터: v_gov_list (11_v_gov_list.sql — definer 뷰, anon SELECT 전용) ──
    const $ = (id) => document.getElementById(id);
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const kstToday = () => {
      const p2 = new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).formatToParts(new Date());
      const o = Object.fromEntries(p2.map((x) => [x.type, x.value]));
      return `${o.year}-${o.month}-${o.day}`;
    };
    // NEW 배지 — 전역 기준: KST 당일 수집 (결정론)
    const isNewToday = (v) => {
      if (!v) return false;
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return false;
      const p3 = new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).formatToParts(d);
      const o3 = Object.fromEntries(p3.map((x) => [x.type, x.value]));
      return `${o3.year}-${o3.month}-${o3.day}` === kstToday();  // timestamptz(UTC)도 KST 당일로 정확 판정
    };
    const newBadge = (v) => isNewToday(v) ? '<span class="new-badge">NEW</span>' : "";
    const ddayBadge = (n) => {
      if (n === null || n === undefined) return '<span class="dday always">상시</span>';
      if (n < 0) return '<span class="dday always">마감</span>';
      return `<span class="dday${n <= 7 ? " urgent" : ""} num">${n === 0 ? "D-day" : `D-${n}`}</span>`;
    };
    const fmtDate = (v) => {
      if (!v) return "상시 접수";
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return String(v).slice(0, 10);
      return new Intl.DateTimeFormat("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).format(d).replace(/\.$/, "");
    };
    const fmtTime = (ts) => {
      if (!ts) return "오늘 기준";
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return "오늘 기준";
      return new Intl.DateTimeFormat("ko-KR", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: "Asia/Seoul" }).format(d) + " 업데이트";
    };

    async function load() {
      const sb = ainAuth.init("authSlot") || ainAuth.getClient();
      const { data, error, count } = await sb.from("v_gov_list")
        .select("program_name,host_org,application_end_date,application_period_text,d_day,source_url,summary,first_seen_date,last_updated", { count: "exact" })
        .order("application_end_date", { ascending: true, nullsFirst: false })
        .limit(100);
      if (error) {
        $("listBody").innerHTML = `<tr><td class="no-th" colspan="4"><div class="empty"><b>목록을 불러올 수 없습니다</b>잠시 후 새로고침 해주세요</div></td></tr>`;
        console.error(error);
        return;
      }
      const rows = data || [];
      const total = count ?? rows.length;
      const week = rows.filter((r) => Number.isFinite(Number(r.d_day)) && r.d_day !== null && r.d_day >= 0 && r.d_day <= 7).length;
      $("statActive").textContent = total.toLocaleString("ko-KR");
      $("statWeek").textContent = week.toLocaleString("ko-KR");
      $("listCnt").textContent = `${total.toLocaleString("ko-KR")}건`;
      const latest = rows.reduce((m, r) => (r.last_updated > m ? r.last_updated : m), "");
      $("listUpd").textContent = fmtTime(latest);
      if (!rows.length) {
        $("listBody").innerHTML = `<tr><td class="no-th" colspan="4"><div class="empty"><b>접수 중인 공고가 없습니다</b>기업마당 공고 기준 — 매일 갱신</div></td></tr>`;
        return;
      }
      $("listBody").innerHTML = rows.map((r) => `
        <tr>
          <td data-th="사업명" class="no-th">
            <div class="cell-title">${newBadge(r.first_seen_date)}${esc(r.program_name)}</div>
            <div class="cell-sub">${esc(r.host_org || "주관기관 확인")}${r.application_period_text ? " · " + esc(r.application_period_text) : ""}</div>
            ${r.summary ? r.summary.split("\n").map((ln) => `<div class="cell-sub">${esc(ln)}</div>`).join("") : ""}
          </td>
          <td data-th="접수마감" class="nowrap num">${esc(fmtDate(r.application_end_date))}</td>
          <td data-th="남은기간">${ddayBadge(r.application_end_date === null ? null : Number(r.d_day))}</td>
          <td data-th="원문" class="ta-r no-th">${r.source_url ? `<a class="btn-src" href="${esc(r.source_url)}" target="_blank" rel="noopener">원문 보기<svg class="icon sm"><use href="#i-ext"/></svg></a>` : ""}</td>
        </tr>`).join("");
    }
    document.addEventListener("DOMContentLoaded", () => { load().catch(console.error); });

    
  </script>
