  <main class="wrap">
    <header class="page-head">
      <div class="sec-label">Maker · 고객 안내문</div>
      <h1 class="page-title">고객 안내문</h1>
      <p class="page-sub">업종을 고르면 기본 문구가 채워집니다. 제목·내용·순서를 자유롭게 고치고, 카톡으로 보내거나 인쇄하세요.</p>
    </header>

    <div class="maker-grid">
      <div class="form-col">
        <form class="form-card" autocomplete="off" onsubmit="return false">
          <div class="field">
            <label>업종</label>
            <div id="fieldSearch"></div>
            <p class="hint">목록에 없으면 그대로 입력한 뒤 "직접 입력으로 사용"을 누르세요.</p>
          </div>
          <div class="field">
            <label for="fTitle">문서 제목</label>
            <input type="text" id="fTitle" placeholder="비우면 자동: 업종명 + 안내" maxlength="30">
          </div>
          <div class="field-row">
            <div class="field">
              <label for="fBiz">상호명</label>
              <input type="text" id="fBiz" placeholder="에어컨 인테리어 연구소" maxlength="20">
            </div>
            <div class="field">
              <label for="fPhone">연락처</label>
              <input type="tel" id="fPhone" placeholder="010-0000-0000" maxlength="20">
            </div>
          </div>
          <div class="field">
            <label for="fArea">지역</label>
            <input type="text" id="fArea" placeholder="수도권 전지역" maxlength="24">
          </div>
          <div class="field">
            <label>대표색</label>
            <div id="colorCtl"></div>
          </div>
          <div class="field">
            <label>카드 배경 (흰색 ↔ 검정)</label>
            <div id="grayCtl"></div>
          </div>
          <div class="field">
            <label>크기</label>
            <div id="fmtCtl"></div>
          </div>
        </form>

        <div class="form-card" style="margin-top:14px">
          <div class="field">
            <label>안내 내용 (제목·내용·순서 자유 편집)</label>
            <div class="sections" id="sections"></div>
            <button type="button" class="sec-add" id="secAdd">＋ 내용 칸 추가</button>
          </div>
        </div>
      </div>

      <div class="preview-col">
        <div class="preview-card">
          <div class="preview-label"><span>미리보기</span><span id="previewSize"></span></div>
          <canvas id="cv" width="1080" height="1527" role="img" aria-label="안내문 미리보기"></canvas>
          <p class="preview-tip">미리보기의 글자를 누르면 크기·간격·정렬을 바꿀 수 있어요.</p>
          <div id="adjustPanel"></div>
        </div>
      </div>
    </div>
  </main>

  <div class="action-bar">
    <button type="button" id="btnShare">공유 (카톡)</button>
    <button type="button" id="btnSave">이미지 저장</button>
  </div>
  <div class="toast" id="toast" role="status"></div>
