<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>고객 안내문 만들기 | 에인연</title>
  <meta name="description" content="업종만 고르면 시공 후 고객 안내문이 완성됩니다. 섹션 자유 편집, 카톡·인쇄 규격 지원.">
  <link rel="canonical" href="https://ainyeon.com/maker/notice/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="고객 안내문 만들기 | 에인연">
  <meta property="og:description" content="전 업종 프리셋 — 3분이면 현장에서 바로 쓰는 안내문.">
  <meta property="og:url" content="https://ainyeon.com/maker/notice/">
  <meta property="og:image" content="https://ainyeon.com/assets/og.png">
  <meta name="theme-color" content="#F7F7F8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preload" href="/assets/fonts/PretendardVariable.subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/assets/css/ain.css">
  <link rel="stylesheet" href="/maker/maker.css">
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="/auth.js"></script>
  <script defer src="/assets/js/ain-common.js"></script>
  <script defer src="/maker/maker-core.js"></script>
  <script defer src="/maker/notice/notice.js"></script>
</head>
<body>
  <nav class="nav" id="nav">
    <a class="brand" href="/"><span class="brand-mark"></span>A.IN</a>
    <a class="menu-pill" href="/maker/"><span class="plus">←</span>메이커 허브</a>
    <div class="nav-tags">
      <a href="/maker/notice/">고객 안내문</a>
      <a href="/maker/compare/">전·중·후 비교</a>
    </div>
    <div class="nav-right">
      <a class="menu-pill" href="#" id="kakaoStart"><span class="plus">+</span>카카오로 시작</a>
    </div>
  </nav>
  <main class="wrap">
    <header class="page-head">
      <div class="sec-label">Template Maker · 고객 안내문</div>
      <h1 class="page-title">시공 후 고객 안내문</h1>
      <p class="page-sub">업종을 고르면 기본 문구가 채워집니다. 섹션 제목·내용·순서 전부 자유 편집 — 모든 입력이 미리보기에 즉시 반영됩니다.</p>
    </header>

    <div class="maker-grid">
      <div class="form-col">
        <form class="form-card" autocomplete="off" onsubmit="return false">
          <div class="field">
            <label>업종</label>
            <div id="fieldSearch"></div>
            <p class="hint">목록에 없으면 그대로 입력 후 "직접 입력으로 사용"을 누르세요.</p>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="fBiz">상호명</label>
              <input type="text" id="fBiz" placeholder="에어컨 인테리어 연구소" maxlength="20">
            </div>
            <div class="field">
              <label for="fPhone">연락처</label>
              <input type="tel" id="fPhone" placeholder="010-0000-0000" maxlength="20">
            </div>
          </div>
          <div class="field">
            <label for="fArea">시공 지역</label>
            <input type="text" id="fArea" placeholder="수도권 전지역" maxlength="24">
          </div>
          <div class="field">
            <label for="fColor">대표색 (어두운 색은 글자가 자동 반전)</label>
            <div class="color-field">
              <input type="color" id="fColor" value="#4F8CFF" aria-label="대표색 컬러피커">
              <input type="text" id="fHex" value="#4F8CFF" maxlength="7" aria-label="HEX 직접 입력">
            </div>
          </div>
          <div class="field">
            <label>카드 스타일</label>
            <div class="toggle-group" id="styleToggle" role="group" aria-label="카드 스타일">
              <button type="button" data-style="white" class="on">미니멀 화이트</button>
              <button type="button" data-style="dark">다크 프리미엄</button>
            </div>
          </div>
          <div class="field">
            <label>출력 규격</label>
            <div class="toggle-group" id="fmtToggle" role="group" aria-label="출력 규격"></div>
          </div>
        </form>

        <div class="form-card" style="margin-top:14px">
          <div class="field">
            <label>안내 섹션 (제목·내용·순서 자유 편집)</label>
            <div class="sections" id="sections"></div>
            <button type="button" class="sec-add" id="secAdd">＋ 섹션 추가</button>
          </div>
        </div>
      </div>

      <div class="preview-col">
        <div class="preview-card">
          <div class="preview-label"><span>미리보기 — 입력 즉시 반영</span><span id="previewSize"></span></div>
          <canvas id="cv" width="1080" height="1527" role="img" aria-label="안내문 미리보기"></canvas>
        </div>
      </div>
    </div>
  </main>

  <div class="action-bar">
    <button type="button" id="btnShare">공유 (카톡)</button>
    <button type="button" id="btnSave">PNG 저장</button>
  </div>
  <div class="toast" id="toast" role="status"></div>
</body>
</html>
