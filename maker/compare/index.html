<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>홍보 카드 만들기 | 에어컨 인테리어 연구소</title>
  <meta name="description" content="당근·인스타에 올리는 홍보 카드를 만듭니다. 전후 비교, 3분할, 사진+문구, 문구 배너 — 사진은 기기 밖으로 나가지 않습니다.">
  <link rel="canonical" href="https://ainyeon.com/maker/compare/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="홍보 카드 만들기 | 에어컨 인테리어 연구소">
  <meta property="og:description" content="사진 한두 장이면 홍보 카드 완성 — 서버 전송 없음.">
  <meta property="og:url" content="https://ainyeon.com/maker/compare/">
  <meta property="og:image" content="https://ainyeon.com/assets/og.png">
  <meta name="theme-color" content="#F3F2EF">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preload" href="/assets/fonts/PretendardVariable.subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/assets/css/design-tokens.css?v=10">
  <link rel="stylesheet" href="/assets/css/components.css?v=10">
  <link rel="stylesheet" href="/maker/maker.css?v=10">
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="/auth.js"></script>
  <script defer src="/assets/js/ain-common.js"></script>
  <script defer src="/maker/maker-core.js"></script>
  <script defer src="/maker/compare/compare.js"></script>
</head>
<body class="has-tabbar">
  <nav class="tnav">
    <div class="tnav-in">
      <a class="brand" href="/"><svg class="brand-word" viewBox="0 0 78 22" role="img" aria-label="A.IN"><defs><linearGradient id="bgw" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2D4A9E"/><stop offset="1" stop-color="#9E2D3D"/></linearGradient></defs><text x="0" y="17.5" font-size="20" font-weight="800" letter-spacing="-0.5" fill="url(#bgw)">A.IN</text></svg><span class="brand-name">에어컨 인테리어 연구소</span></a>
      <div class="tnav-links">
        <a href="/">홈</a>
        <a class="on" href="/maker/">메이커</a>
        <a href="/maker/notice/">고객 안내문</a>
        <a href="/maker/compare/">홍보 카드</a>
      </div>
      <div class="tnav-auth" id="authSlot"></div>
    </div>
  </nav>
  <main class="wrap">
    <header class="page-head">
      <div class="sec-label">Maker · 홍보 카드</div>
      <h1 class="page-title">홍보 카드</h1>
      <p class="page-sub">모양을 고르고 사진과 문구만 넣으면 완성. 사진은 기기 안에서만 처리됩니다.</p>
    </header>

    <div class="maker-grid">
      <div class="form-col">
        <form class="form-card" autocomplete="off" onsubmit="return false">
          <div class="field">
            <label>카드 모양</label>
            <div class="lp-grid" id="layoutPick" role="group" aria-label="카드 모양 선택"></div>
          </div>
          <div class="field" id="photoField">
            <label>사진</label>
            <div class="photo-row" id="photoRow">
              <div class="photo-drop" id="dropBefore">
                <span class="tag" id="tagBefore">시공 전</span>
                <span id="beforeHint">탭해서<br>사진 선택</span>
                <input type="file" id="fileBefore" accept="image/*" aria-label="첫 번째 사진">
              </div>
              <div class="photo-drop" id="dropMid">
                <span class="tag" id="tagMid">시공 중</span>
                <span id="midHint">탭해서<br>사진 선택</span>
                <input type="file" id="fileMid" accept="image/*" aria-label="가운데 사진">
              </div>
              <div class="photo-drop" id="dropAfter">
                <span class="tag" id="tagAfter">시공 후</span>
                <span id="afterHint">탭해서<br>사진 선택</span>
                <input type="file" id="fileAfter" accept="image/*" aria-label="마지막 사진">
              </div>
            </div>
            <p class="hint">사진은 넣는 즉시 기기 안에서 줄여서 쓰며 어디에도 전송되지 않습니다.</p>
          </div>
          <div class="field" id="labelField">
            <label>사진 이름표</label>
            <div class="field-row" style="grid-template-columns:1fr 1fr 1fr">
              <input type="text" id="lbBefore" maxlength="10" aria-label="첫 번째 이름표">
              <input type="text" id="lbMid" maxlength="10" aria-label="가운데 이름표">
              <input type="text" id="lbAfter" maxlength="10" aria-label="마지막 이름표">
            </div>
            <div class="label-presets" id="labelPresets"></div>
          </div>
          <div class="field" id="textField">
            <div class="field">
              <label for="fHead">한 줄 문구</label>
              <input type="text" id="fHead" placeholder="믿고 맡기는 시공, 확실한 마무리" maxlength="30">
            </div>
            <div class="field">
              <label for="fSub">보조 문구</label>
              <input type="text" id="fSub" placeholder="상담·견적 언제든 환영합니다" maxlength="40">
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="fBiz">상호명</label>
              <input type="text" id="fBiz" placeholder="에어컨 인테리어 연구소" maxlength="20">
            </div>
            <div class="field">
              <label for="fPhone">연락처</label>
              <input type="tel" id="fPhone" placeholder="010-0000-0000" maxlength="20">
            </div>
          </div>
          <div class="field" id="colorField">
            <label>대표색 (배너·문구 배경)</label>
            <div id="colorCtl"></div>
          </div>
          <div class="field">
            <label>아래 상호 띠 색</label>
            <div class="toggle-group" id="barToggle" role="group" aria-label="아래 상호 띠 색">
              <button type="button" data-bar="ink" class="on">검정 띠</button>
              <button type="button" data-bar="white">흰색 띠</button>
            </div>
          </div>
          <div class="field">
            <label>크기</label>
            <div id="fmtCtl"></div>
          </div>
        </form>
      </div>

      <div class="preview-col">
        <div class="preview-card">
          <div class="preview-label"><span>미리보기</span><span id="previewSize"></span></div>
          <canvas id="cv" width="1080" height="1080" role="img" aria-label="홍보 카드 미리보기"></canvas>
          <p class="preview-tip">미리보기의 글자를 누르면 크기를 바꿀 수 있어요.</p>
          <div id="adjustPanel"></div>
        </div>
      </div>
    </div>
  </main>

  <div class="action-bar">
    <button type="button" id="btnShare">공유 (카톡)</button>
    <button type="button" id="btnSave">이미지 저장</button>
  </div>
  <div class="toast" id="toast" role="status"></div>
</body>
</html>
