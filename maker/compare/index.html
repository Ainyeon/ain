<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>전·중·후 비교 카드 | 에인연</title>
  <meta name="description" content="시공 전·중·후 사진으로 만드는 비교 카드. 당근·인스타·릴스 규격, 사진은 기기 밖으로 나가지 않습니다.">
  <link rel="canonical" href="https://ainyeon.com/maker/compare/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="전·중·후 비교 카드 | 에인연">
  <meta property="og:description" content="사진 2~3장이면 홍보 카드 완성 — 서버 전송 없음.">
  <meta property="og:url" content="https://ainyeon.com/maker/compare/">
  <meta property="og:image" content="https://ainyeon.com/assets/og.png">
  <meta name="theme-color" content="#F7F7F8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preload" href="/assets/fonts/PretendardVariable.subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/assets/css/ain.css">
  <link rel="stylesheet" href="/maker/maker.css">
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="/auth.js"></script>
  <script defer src="/assets/js/ain-common.js"></script>
  <script defer src="/maker/maker-core.js"></script>
  <script defer src="/maker/compare/compare.js"></script>
</head>
<body>
  <nav class="nav" id="nav">
    <a class="brand" href="/"><span class="brand-mark"></span>A.IN</a>
    <a class="menu-pill" href="/maker/"><span class="plus">←</span>메이커 허브</a>
    <div class="nav-tags">
      <a href="/maker/notice/">고객 안내문</a>
      <a href="/maker/compare/">전·중·후 비교</a>
    </div>
    <div class="nav-right">
      <a class="menu-pill" href="#" id="kakaoStart"><span class="plus">+</span>카카오로 시작</a>
    </div>
  </nav>
  <main class="wrap">
    <header class="page-head">
      <div class="sec-label">Template Maker · 전·중·후 비교</div>
      <h1 class="page-title">시공 전·중·후 비교 카드</h1>
      <p class="page-sub">사진 2장이면 좌우 비교, '시공 중'까지 넣으면 3분할로 자동 전환. 사진은 기기 안에서만 처리됩니다.</p>
    </header>

    <div class="maker-grid">
      <div class="form-col">
        <form class="form-card" autocomplete="off" onsubmit="return false">
          <div class="field">
            <label>시공 전·중·후 사진 ('시공 중'은 선택)</label>
            <div class="photo-row">
              <div class="photo-drop" id="dropBefore">
                <span class="tag">시공 전</span>
                <span id="beforeHint">시공 전<br>탭해서 선택</span>
                <input type="file" id="fileBefore" accept="image/*" aria-label="시공 전 사진">
              </div>
              <div class="photo-drop" id="dropMid">
                <span class="tag">시공 중</span>
                <span id="midHint">시공 중 (선택)<br>탭해서 선택</span>
                <input type="file" id="fileMid" accept="image/*" aria-label="시공 중 사진 (선택)">
              </div>
              <div class="photo-drop" id="dropAfter">
                <span class="tag">시공 후</span>
                <span id="afterHint">시공 후<br>탭해서 선택</span>
                <input type="file" id="fileAfter" accept="image/*" aria-label="시공 후 사진">
              </div>
            </div>
            <p class="hint">사진은 업로드 즉시 기기 안에서 리사이즈되며 어디에도 전송되지 않습니다.</p>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="fBiz">상호명</label>
              <input type="text" id="fBiz" placeholder="에어컨 인테리어 연구소" maxlength="20">
            </div>
            <div class="field">
              <label for="fPhone">연락처</label>
              <input type="tel" id="fPhone" placeholder="010-0000-0000" maxlength="20">
            </div>
          </div>
          <div class="field">
            <label>브랜드 바 스타일</label>
            <div class="toggle-group" id="styleToggle" role="group" aria-label="브랜드 바 스타일">
              <button type="button" data-style="ink" class="on">잉크 (기본)</button>
              <button type="button" data-style="white">화이트</button>
            </div>
          </div>
          <div class="field">
            <label>출력 규격</label>
            <div class="toggle-group" id="fmtToggle" role="group" aria-label="출력 규격"></div>
          </div>
        </form>
      </div>

      <div class="preview-col">
        <div class="preview-card">
          <div class="preview-label"><span>미리보기 — 입력 즉시 반영</span><span id="previewSize"></span></div>
          <canvas id="cv" width="1080" height="1080" role="img" aria-label="비교 카드 미리보기"></canvas>
        </div>
      </div>
    </div>
  </main>

  <div class="action-bar">
    <button type="button" id="btnShare">공유 (카톡)</button>
    <button type="button" id="btnSave">PNG 저장</button>
  </div>
  <div class="toast" id="toast" role="status"></div>
</body>
</html>
