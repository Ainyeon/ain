<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>정부 지원사업 | 에인연 (시안)</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#F3F2EF">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preload" href="/assets/fonts/PretendardVariable.subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/assets/css/design-tokens.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="/auth.js"></script>
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-landmark" viewBox="0 0 24 24"><line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7"/></symbol>
      <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></symbol>
      <symbol id="i-ext" viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></symbol>
      <symbol id="i-sort" viewBox="0 0 24 24"><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/></symbol>
    </defs>
  </svg>

  <nav class="tnav">
    <div class="tnav-in">
      <a class="brand" href="/redesign/"><span class="brand-sq">A</span>에인연</a>
      <div class="tnav-links">
        <a href="/redesign/">홈</a>
        <a href="/calendar/">입주정보</a>
        <a href="/prices/">시세</a>
        <a class="on" href="/redesign/gov/">정부사업</a>
        <a href="/news/">업계뉴스</a>
        <a href="/board/free/">커뮤니티</a>
      </div>
      <div class="tnav-auth" id="authSlot"></div>
    </div>
  </nav>

  <main class="shell">
    <header class="phero">
      <div class="phero-bar">
        <div>
          <div class="crumb">GOVERNMENT PROGRAMS</div>
          <h1>정부 지원사업</h1>
          <p class="sub">기업마당 공고를 매일 자동 수집해 마감이 가까운 순으로 정리합니다. 신청은 원문에서 진행하세요.</p>
        </div>
        <div class="phero-stat">
          <div class="st"><div class="n num" id="statActive">—</div><div class="l">접수 중</div></div>
          <div class="st"><div class="n num" id="statWeek">—</div><div class="l">7일 내 마감</div></div>
        </div>
      </div>
    </header>

    <section class="panel" style="margin-bottom:var(--sp-8)" aria-labelledby="hList">
      <div class="phead">
        <svg class="icon"><use href="#i-landmark"/></svg>
        <h2 id="hList">전체 공고</h2>
        <span class="cnt num" id="listCnt">—</span>
        <div class="phead-meta">
          <span class="upd hide-m"><svg class="icon sm"><use href="#i-sort"/></svg>마감임박순</span>
          <span class="upd"><svg class="icon sm"><use href="#i-clock"/></svg><span id="listUpd">확인 중</span></span>
        </div>
      </div>
      <div class="tscroll">
        <table class="dtable stack">
          <thead>
            <tr>
              <th>사업명</th>
              <th class="nowrap">접수마감</th>
              <th class="nowrap">남은기간</th>
              <th class="nowrap ta-r">원문</th>
            </tr>
          </thead>
          <tbody id="listBody">
            <tr><td class="no-th" colspan="4"><div class="empty">공고를 불러오는 중</div></td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="tfoot">
    <div class="tfoot-in">
      <div>에어컨 인테리어 연구소 A.IN — 출처: 중소벤처기업부 기업마당</div>
      <div class="links">
        <a href="/redesign/">홈</a>
        <a href="https://www.bizinfo.go.kr" target="_blank" rel="noopener">기업마당</a>
      </div>
    </div>
  </footer>

  <script>
    // ── 데이터: 기존 소스(govt_programs, 현 anon grant) 렌더만. v_gov_list 전환은 P2 ──
    const $ = (id) => document.getElementById(id);
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const kstToday = () => {
      const p = new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).formatToParts(new Date());
      const o = Object.fromEntries(p.map((x) => [x.type, x.value]));
      return `${o.year}-${o.month}-${o.day}`;
    };
    const ddayNum = (end) => end ? Math.round((new Date(`${String(end).slice(0, 10)}T00:00:00+09:00`) - new Date(`${kstToday()}T00:00:00+09:00`)) / 864e5) : null;
    const ddayBadge = (end) => {
      const n = ddayNum(end);
      if (n === null) return '<span class="dday always">상시</span>';
      if (n < 0) return '<span class="dday always">마감</span>';
      return `<span class="dday${n <= 7 ? " urgent" : ""} num">${n === 0 ? "D-day" : `D-${n}`}</span>`;
    };
    const fmtDate = (v) => {
      if (!v) return "상시 접수";
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return String(v).slice(0, 10);
      return new Intl.DateTimeFormat("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "Asia/Seoul" }).format(d).replace(/\.$/, "");
    };
    const fmtTime = (ts) => {
      if (!ts) return "오늘 기준";
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return "오늘 기준";
      return new Intl.DateTimeFormat("ko-KR", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: "Asia/Seoul" }).format(d) + " 업데이트";
    };

    async function load() {
      const sb = ainAuth.init("authSlot") || ainAuth.getClient();
      const today = kstToday();
      const { data, error, count } = await sb.from("govt_programs")
        .select("program_name,host_org,application_end_date,application_period_text,source_url,updated_at", { count: "exact" })
        .eq("status", "active")
        .or(`application_end_date.gte.${today},application_end_date.is.null`)
        .order("application_end_date", { ascending: true, nullsFirst: false })
        .limit(100);
      if (error) {
        // 원본 anon 접근 회수 상태(RLS 게이팅) — P2에서 v_gov_list 공개뷰로 전환.
        // 시안 판정용 샘플 행 렌더 + "샘플" 명시. 실 카운트는 v_stat_gov(공개 집계)로.
        console.error(error);
        renderSample(sb);
        return;
      }
      const rows = data || [];
      const total = count ?? rows.length;
      const week = rows.filter((r) => { const n = ddayNum(r.application_end_date); return n !== null && n >= 0 && n <= 7; }).length;
      $("statActive").textContent = total.toLocaleString("ko-KR");
      $("statWeek").textContent = week.toLocaleString("ko-KR");
      $("listCnt").textContent = `${total.toLocaleString("ko-KR")}건`;
      const latest = rows.reduce((m, r) => (r.updated_at > m ? r.updated_at : m), "");
      $("listUpd").textContent = fmtTime(latest);
      if (!rows.length) {
        $("listBody").innerHTML = `<tr><td class="no-th" colspan="4"><div class="empty"><b>접수 중인 공고가 없습니다</b>기업마당 공고 기준 — 매일 갱신</div></td></tr>`;
        return;
      }
      $("listBody").innerHTML = rows.map((r) => `
        <tr>
          <td data-th="사업명" class="no-th">
            <div class="cell-title">${esc(r.program_name)}</div>
            <div class="cell-sub">${esc(r.host_org || "주관기관 확인")}${r.application_period_text ? " · " + esc(r.application_period_text) : ""}</div>
          </td>
          <td data-th="접수마감" class="nowrap num">${esc(fmtDate(r.application_end_date))}</td>
          <td data-th="남은기간">${ddayBadge(r.application_end_date)}</td>
          <td data-th="원문" class="ta-r no-th">${r.source_url ? `<a class="btn-src" href="${esc(r.source_url)}" target="_blank" rel="noopener">원문 보기<svg class="icon sm"><use href="#i-ext"/></svg></a>` : ""}</td>
        </tr>`).join("");
    }
    // 시안 판정용 샘플 (P2 v_gov_list 전환 전까지 anon은 리스트 접근 불가)
    async function renderSample(sb) {
      const base = kstToday();
      const plus = (n) => {
        const d = new Date(`${base}T00:00:00+09:00`); d.setDate(d.getDate() + n);
        return d.toISOString().slice(0, 10);
      };
      const sample = [
        { program_name: "중소기업 에너지효율 설비교체 지원사업", host_org: "한국에너지공단", application_end_date: plus(3) },
        { program_name: "소상공인 냉난방기 교체 지원 (2차)", host_org: "소상공인시장진흥공단", application_end_date: plus(6) },
        { program_name: "뿌리기업 공정혁신 설비투자 지원", host_org: "중소벤처기업부", application_end_date: plus(14) },
        { program_name: "고효율 히트펌프 보급 시범사업", host_org: "산업통상자원부", application_end_date: plus(23) },
        { program_name: "건물 에너지진단 컨설팅 바우처", host_org: "한국에너지공단", application_end_date: plus(41) },
        { program_name: "소기업 스마트공방 기술보급", host_org: "중소벤처기업부", application_end_date: null },
      ];
      let total = sample.length;
      try {
        const { data } = await sb.from("v_stat_gov").select("active_count").limit(1);
        if (Array.isArray(data) && data.length && Number(data[0].active_count)) total = Number(data[0].active_count);
      } catch (_) { /* 집계 실패 시 샘플 수 유지 */ }
      const week = sample.filter((r) => { const n = ddayNum(r.application_end_date); return n !== null && n >= 0 && n <= 7; }).length;
      $("statActive").textContent = total.toLocaleString("ko-KR");
      $("statWeek").textContent = week.toLocaleString("ko-KR");
      $("listCnt").textContent = "표시용 샘플";
      $("listUpd").textContent = "미리보기";
      $("listBody").innerHTML = sample.map((r) => `
        <tr>
          <td data-th="사업명" class="no-th">
            <div class="cell-title">${esc(r.program_name)}</div>
            <div class="cell-sub">${esc(r.host_org)}</div>
          </td>
          <td data-th="접수마감" class="nowrap num">${esc(fmtDate(r.application_end_date))}</td>
          <td data-th="남은기간">${ddayBadge(r.application_end_date)}</td>
          <td data-th="원문" class="ta-r no-th"><a class="btn-src" href="https://www.bizinfo.go.kr" target="_blank" rel="noopener">원문 보기<svg class="icon sm"><use href="#i-ext"/></svg></a></td>
        </tr>`).join("");
    }

    document.addEventListener("DOMContentLoaded", () => { load().catch(console.error); });
  </script>
</body>
</html>
